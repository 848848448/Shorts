<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<body>
    <div class="stories-bar">

        <div onclick="location.reload()">🏠</div>
        <div onclick="showReels()">🎬</div>
        <div style="color:#ff0050; font-size:35px;" onclick="document.getElementById('f-up').click()">⊕</div>
        <div onclick="alert('Text')">✍️</div>
        <div onclick="alert('Settings')">⚙️</div>
