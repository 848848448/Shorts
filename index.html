<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts Hub - Professional Edition</title>
    <style>
        :root { --bg: #000; --text: #fff; --primary: #ff0050; --border: #262626; --card: #121212; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        .page { display: none; height: 100vh; overflow-y: auto; padding-bottom: 90px; box-sizing: border-box; }
        .active-page { display: block; }

        /* Login Screen */
        #loginScreen { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        
        /* Home Hub Design */
        .hub-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .hub-card { background: var(--card); border-radius: 15px; height: 140px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .hub-card img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .hub-card span { z-index: 2; font-weight: bold; font-size: 18px; text-shadow: 2px 2px 4px #000; }

        /* Video Feed - Autoplay Style */
        .video-container { width: 100%; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 10px; }
        .video-wrapper { width: 100%; aspect-ratio: 9/16; background: #050505; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Comments */
        .comments-section { padding: 10px; font-size: 14px; }
        .comment-item { margin-bottom: 5px; }
        .comment-input { width: 80%; padding: 8px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: white; }

        /* Admin UI */
        .admin-stat-box { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-around; }
        .reorder-item { display: flex; justify-content: space-between; background: #222; padding: 10px; margin-bottom: 5px; border-radius: 5px; }
        
        /* General Styles */
        .header { position: sticky; top: 0; background: #000; padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #000; padding: 15px 0; border-top: 1px solid var(--border); z-index: 1000; }
    </style>
</head>
<body>

    <div id="loginScreen" class="page">
        <h1 style="color:var(--primary);">Shorts Hub</h1>
        <p>שלום! ביטע שרייבט אייך איין</p>
        <input type="text" id="userNickname" placeholder="דיין ניקנעם">
        <input type="email" id="userEmail" placeholder="דיין אימעיל">
        <button class="btn" onclick="initUser()">עפֿנען עפּ</button>
    </div>

    <div id="homeHub" class="page">
        <div class="header">
            <div id="appLogoDisplay" style="font-weight:bold; font-size:22px;">Shorts Hub</div>
            <div onclick="showPage('profilePage')">⚙️</div>
        </div>
        <div id="mainMenu" class="hub-container">
            </div>
    </div>

    <div id="videoPage" class="page">
        <div class="header"><span onclick="showPage('homeHub')">←</span> <strong>Shorts</strong></div>
        <div id="videoFeed"></div>
    </div>

    <div id="photoPage" class="page">
        <div class="header"><span onclick="showPage('homeHub')">←</span> <strong>Photos</strong></div>
        <div id="photoFeed" style="display:grid; grid-template-columns:1fr 1fr; gap:5px; padding:5px;"></div>
    </div>

    <div id="musicPage" class="page">
        <div class="header"><span onclick="showPage('homeHub')">←</span> <strong>Music</strong></div>
        <div id="musicFeed" style="padding:15px;"></div>
    </div>

    <div id="chatPage" class="page">
        <div class="header"><span onclick="showPage('homeHub')">←</span> <strong>Messages</strong></div>
        <div id="chatBox" style="padding:15px; height:70vh; overflow-y:auto;"></div>
        <div style="padding:10px; border-top:1px solid #222; display:flex; gap:5px;">
            <input type="text" id="chatInput" placeholder="שרייב עפעס...">
            <button class="btn" style="width:auto; margin-top:0;" onclick="sendChatMsg()">Send</button>
        </div>
    </div>

    <div id="requestPage" class="page">
        <div class="header"><span onclick="showPage('homeHub')">←</span> <strong>Requests</strong></div>
        <div style="padding:20px;">
            <p>וואס ווילסטו מיר זאלן ארויפלייגן?</p>
            <textarea id="reqText" style="width:100%; height:100px; background:#111; color:white; border:1px solid #333; padding:10px; border-radius:10px;"></textarea>
            <button class="btn" onclick="submitRequest()">שיק ריקוועסט</button>
        </div>
    </div>

    <div id="profilePage" class="page">
        <div class="header"><span onclick="showPage('homeHub')">←</span> <strong>Admin Settings</strong></div>
        <div style="padding:20px;">
            <div id="adminLoginArea">
                <input type="password" id="adminPass" placeholder="Admin פאסווארט">
                <button class="btn" onclick="checkAdmin()">Login as Admin</button>
            </div>
            <div id="adminPanel" style="display:none;">
                <div class="admin-stat-box">
                    <div style="text-align:center;"><b>Users</b><br><span id="countUsers">0</span></div>
                    <div style="text-align:center;"><b>Visits</b><br><span id="countVisits">0</span></div>
                </div>
                <h4>טויש דעם סדר פונעם מעניו:</h4>
                <div id="reorderList"></div>
                <hr>
                <h4>Requests:</h4>
                <div id="adminRequests" style="font-size:12px; color:#aaa;"></div>
                <hr>
                <button class="btn" style="background:#444;" onclick="localStorage.clear(); location.reload();">Reset System</button>
            </div>
        </div>
    </div>

    <input type="file" id="mediaUpload" style="display:none;" onchange="handleFileUpload(event)">
    <div class="bottom-nav">
        <div class="nav-btn" onclick="showPage('homeHub')">🏠</div>
        <div class="nav-btn" onclick="document.getElementById('mediaUpload').click()" style="color:var(--primary); font-size:32px;">⊕</div>
        <div class="nav-btn" onclick="showPage('chatPage')">💬</div>
    </div>

    <script>
        // --- 1. Database/State ---
        let db = JSON.parse(localStorage.getItem('shortsHubDB')) || {
            users: [], posts: [], requests: [], 
            visits: 0, 
            menuOrder: ['Videos', 'Photos', 'Music', 'Messages', 'Requests'],
            siteName: "Shorts Hub", adminPass: "1234"
        };
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let isAdmin = false;

        // --- 2. Startup ---
        window.onload = function() {
            db.visits++;
            save();
            if(!currentUser) showPage('loginScreen');
            else loadApp();
        };

        function save() { localStorage.setItem('shortsHubDB', JSON.stringify(db)); }

        function initUser() {
            let nick = document.getElementById('userNickname').value;
            let email = document.getElementById('userEmail').value;
            if(nick && email) {
                currentUser = { nick, email };
                if(!db.users.find(u => u.email === email)) db.users.push(currentUser);
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                save(); loadApp();
            }
        }

        function loadApp() {
            renderMenu();
            renderFeeds();
            showPage('homeHub');
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            if(id === 'videoPage') initAutoplay();
        }

        // --- 3. Home Hub & Menu Logic ---
        const menuData = {
            'Videos': { img: 'https://images.unsplash.com/photo-1485846234645-a62644f84728?w=300', page: 'videoPage' },
            'Photos': { img: 'https://images.unsplash.com/photo-1542038784456-1ea8e935640e?w=300', page: 'photoPage' },
            'Music': { img: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=300', page: 'musicPage' },
            'Messages': { img: 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=300', page: 'chatPage' },
            'Requests': { img: 'https://images.unsplash.com/photo-1512314889357-e157c22f938d?w=300', page: 'requestPage' }
        };

        function renderMenu() {
            const container = document.getElementById('mainMenu');
            container.innerHTML = "";
            db.menuOrder.forEach(key => {
                const item = menuData[key];
                container.innerHTML += `
                    <div class="hub-card" onclick="showPage('${item.page}')">
                        <img src="${item.img}">
                        <span>${key}</span>
                    </div>`;
            });
        }

        // --- 4. Autoplay & Content Logic ---
        function handleFileUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                let type = file.type.startsWith('video') ? 'video' : (file.type.startsWith('audio') ? 'music' : 'photo');
                db.posts.push({ id: Date.now(), type, src: e.target.result, user: currentUser.nick, comments: [] });
                save(); renderFeeds();
            };
            reader.readAsDataURL(file);
        }

        function renderFeeds() {
            const vFeed = document.getElementById('videoFeed');
            const pFeed = document.getElementById('photoFeed');
            const mFeed = document.getElementById('musicFeed');
            vFeed.innerHTML = ""; pFeed.innerHTML = ""; mFeed.innerHTML = "";

            db.posts.forEach(p => {
                let adminDel = isAdmin ? `<span style="color:red" onclick="deletePost(${p.id})">Delete</span>` : "";
                if(p.type === 'video') {
                    vFeed.innerHTML += `
                        <div class="video-container">
                            <div class="post-header" style="padding:10px;"><b>${p.user}</b> ${adminDel}</div>
                            <div class="video-wrapper"><video src="${p.src}" loop muted playsinline></video></div>
                            <div class="comments-section" id="comments-${p.id}">${renderComments(p)}</div>
                            <div style="padding:10px;"><input class="comment-input" placeholder="שרייב קאמענטאר..." onkeypress="if(event.key==='Enter') addComment(${p.id}, this.value)"></div>
                        </div>`;
                } else if(p.type === 'photo') {
                    pFeed.innerHTML += `<div style="position:relative"><img src="${p.src}" style="width:100%">${adminDel}</div>`;
                } else if(p.type === 'music') {
                    mFeed.innerHTML += `<div style="background:#111; padding:10px; margin-bottom:10px; border-radius:10px;"><b>${p.user}</b><br><audio src="${p.src}" controls style="width:100%"></audio>${adminDel}</div>`;
                }
            });
        }

        function renderComments(post) {
            return post.comments.map(c => `<div class="comment-item"><b>${c.user}:</b> ${c.txt}</div>`).join("");
        }

        function addComment(postId, txt) {
            let post = db.posts.find(p => p.id === postId);
            post.comments.push({ user: currentUser.nick, txt: txt });
            save(); renderFeeds();
        }

        function initAutoplay() {
            const videos = document.querySelectorAll('video');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) entry.target.play();
                    else entry.target.pause();
                });
            }, { threshold: 0.7 });
            videos.forEach(v => observer.observe(v));
        }

        // --- 5. Admin Functionality ---
        function checkAdmin() {
            if(document.getElementById('adminPass').value === db.adminPass) {
                isAdmin = true;
                document.getElementById('adminLoginArea').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                renderAdmin();
            }
        }

        function renderAdmin() {
            document.getElementById('countUsers').innerText = db.users.length;
            document.getElementById('countVisits').innerText = db.visits;
            
            const reorder = document.getElementById('reorderList');
            reorder.innerHTML = "";
            db.menuOrder.forEach((name, i) => {
                reorder.innerHTML += `
                    <div class="reorder-item">
                        <span>${name}</span>
                        <div>
                            <span onclick="moveMenu(${i}, -1)">🔼</span>
                            <span onclick="moveMenu(${i}, 1)">🔽</span>
                        </div>
                    </div>`;
            });

            document.getElementById('adminRequests').innerHTML = db.requests.map(r => `<p><b>${r.user}:</b> ${r.txt}</p>`).join("");
        }

        function moveMenu(index, dir) {
            let newIdx = index + dir;
            if(newIdx < 0 || newIdx >= db.menuOrder.length) return;
            let temp = db.menuOrder[index];
            db.menuOrder[index] = db.menuOrder[newIdx];
            db.menuOrder[newIdx] = temp;
            save(); renderAdmin(); renderMenu();
        }

        function submitRequest() {
            let txt = document.getElementById('reqText').value;
            if(txt) {
                db.requests.push({ user: currentUser.nick, txt: txt });
                save();
                alert("ריקוועסט געשיקט!");
                document.getElementById('reqText').value = "";
            }
        }

        function deletePost(id) {
            db.posts = db.posts.filter(p => p.id !== id);
            save(); renderFeeds();
        }

        function sendChatMsg() {
            let txt = document.getElementById('chatInput').value;
            if(txt) {
                document.getElementById('chatBox').innerHTML += `<p><b>${currentUser.nick}:</b> ${txt}</p>`;
                document.getElementById('chatInput').value = "";
            }
        }
    </script>
</body>
            </html>
