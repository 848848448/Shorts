<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts Hub - Ultimate Pro</title>
    <style>
        :root { --bg: #000; --text: #fff; --primary: #ff0050; --border: #262626; --card: #121212; --accent: #00f2ea; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        .page { display: none; height: 100vh; overflow-y: auto; padding-bottom: 100px; box-sizing: border-box; }
        .active-page { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login */
        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; height: 100vh; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        
        /* Home Hub */
        .hub-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .hub-card { background: var(--card); border-radius: 20px; height: 150px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); cursor: pointer; transition: transform 0.2s, border 0.2s; }
        .hub-card:active { transform: scale(0.95); border-color: var(--primary); }
        .hub-card img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; pointer-events: none; }
        .hub-card span { z-index: 2; font-weight: bold; font-size: 20px; text-shadow: 2px 2px 10px #000; letter-spacing: 1px; }

        /* Video/Post Feed */
        .video-container { width: 100%; border-bottom: 8px solid #111; padding-bottom: 20px; position: relative; }
        .video-wrapper { width: 100%; aspect-ratio: 9/16; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .post-actions { display: flex; gap: 20px; padding: 15px; align-items: center; }
        .like-btn { cursor: pointer; font-size: 24px; transition: 0.2s; }
        .like-btn.active { color: var(--primary); transform: scale(1.2); }

        /* Admin UI */
        .admin-box { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); margin: 15px; }
        .user-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; align-items: center; }
        .ban-btn { background: red; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }

        /* Global Inputs */
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        /* Navigation */
        .header { position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #000; padding: 15px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-icon { font-size: 24px; cursor: pointer; opacity: 0.6; }
        .nav-icon.active { opacity: 1; color: var(--primary); }
    </style>
</head>
<body>

    <div id="bannedScreen" class="page" style="text-align:center; padding-top:100px;">
        <h1 style="color:red;">Account Disabled</h1>
        <p>דיין אקאונט איז געווארן בלאקירט דורך דעם אדמין.</p>
    </div>

    <div id="loginScreen" class="page">
        <h1 style="color:var(--primary); font-size: 45px; margin:0;">Shorts Hub</h1>
        <p style="opacity:0.7;">The Ultimate Experience</p>
        <div style="width:100%; max-width:300px; margin-top:30px;">
            <input type="text" id="userNickname" placeholder="דיין ניקנעם" autocomplete="off">
            <input type="email" id="userEmail" placeholder="דיין אימעיל אדרעס" autocomplete="off">
            <button class="btn" onclick="handleLogin()">אנהייבן</button>
        </div>
    </div>

    <div id="homeHub" class="page">
        <div class="header">
            <div style="font-weight:bold; font-size:22px; color:var(--primary);">Shorts Hub</div>
            <div onclick="showPage('profilePage')">👤</div>
        </div>
        <div class="hub-container" id="menuGrid"></div>
    </div>

    <div id="videoPage" class="page">
        <div class="header"><span onclick="showPage('homeHub')">←</span> <strong>Shorts</strong></div>
        <div id="videoFeed"></div>
    </div>

    <div id="photoPage" class="page">
        <div class="header"><span onclick="showPage('homeHub')">←</span> <strong>Photos</strong></div>
        <div id="photoFeed" style="padding:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
    </div>

    <div id="musicPage" class="page">
        <div class="header"><span onclick="showPage('homeHub')">←</span> <strong>Music</strong></div>
        <div id="musicFeed" style="padding:15px;"></div>
    </div>

    <div id="chatPage" class="page">
        <div class="header"><strong>Messages</strong></div>
        <div id="chatBox" style="padding:15px; height:70vh; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="position:fixed; bottom:80px; width:100%; display:flex; padding:10px; background:#000; box-sizing:border-box;">
            <input type="text" id="chatInput" placeholder="שרייב א מעסעדזש..." style="margin:0;">
            <button onclick="sendChat()" style="background:var(--primary); border:none; color:white; padding:0 20px; border-radius:10px; margin-right:5px;">Send</button>
        </div>
    </div>

    <div id="profilePage" class="page">
        <div class="header"><span onclick="showPage('homeHub')">←</span> <strong>Settings</strong></div>
        <div style="padding:20px;">
            <div id="adminLogin">
                <input type="password" id="adminKey" placeholder="Admin פאסווארט">
                <button class="btn" onclick="accessAdmin()">Admin Login</button>
            </div>
            <div id="adminPanel" style="display:none;">
                <div class="admin-box">
                    <h3 style="margin-top:0;">Stats</h3>
                    <p>Visitors: <span id="statVisits">0</span> | Users: <span id="statUsers">0</span></p>
                </div>
                <h4>Manage Menu Order</h4>
                <div id="reorderArea"></div>
                <h4>User Management</h4>
                <div id="userManagementList" style="background:#111; border-radius:10px; padding:10px;"></div>
                <h4>Requests</h4>
                <div id="adminReqList" style="font-size:12px; color:#888;"></div>
                <button class="btn" style="background:#444; margin-top:20px;" onclick="fullReset()">System Reset</button>
            </div>
        </div>
    </div>

    <div id="requestPage" class="page">
        <div class="header"><span onclick="showPage('homeHub')">←</span> <strong>Request Content</strong></div>
        <div style="padding:20px;">
            <textarea id="reqInp" placeholder="וואס ווילסטו זען אויף די עפפ?"></textarea>
            <button class="btn" onclick="postRequest()">Submit</button>
        </div>
    </div>

    <input type="file" id="fInp" style="display:none" onchange="processFile(event)">
    
    <div class="bottom-nav" id="navBar">
        <div class="nav-icon" onclick="showPage('homeHub')">🏠</div>
        <div class="nav-icon" onclick="document.getElementById('fInp').click()" style="color:var(--primary); font-size:35px;">⊕</div>
        <div class="nav-icon" onclick="showPage('chatPage')">💬</div>
    </div>

    <script>
        // --- 1. CORE DATA ---
        let app = JSON.parse(localStorage.getItem('ultimateHubDB')) || {
            users: [], posts: [], chats: [], requests: [],
            visits: 0, order: ['Videos', 'Photos', 'Music', 'Messages', 'Requests'],
            banned: []
        };
        let me = JSON.parse(localStorage.getItem('activeSession')) || null;
        let isAdm = false;

        window.onload = () => {
            app.visits++;
            save();
            if(me && app.banned.includes(me.email)) return showPage('bannedScreen');
            if(!me) showPage('loginScreen'); else start();
        };

        function save() { localStorage.setItem('ultimateHubDB', JSON.stringify(app)); }

        // --- 2. LOGIN & START ---
        function handleLogin() {
            let n = document.getElementById('userNickname').value.trim();
            let e = document.getElementById('userEmail').value.trim();
            if(n && e) {
                me = { nick: n, email: e };
                if(!app.users.find(u => u.email === e)) app.users.push(me);
                localStorage.setItem('activeSession', JSON.stringify(me));
                save(); start();
            }
        }

        function start() {
            renderMenu();
            renderFeeds();
            renderChats();
            showPage('homeHub');
        }

        function showPage(id) {
            if(me && app.banned.includes(me.email) && id !== 'bannedScreen') return;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            if(id === 'videoPage') setTimeout(runAutoplay, 500);
        }

        // --- 3. MENU SYSTEM ---
        const config = {
            'Videos': { img: 'https://images.unsplash.com/photo-1492691523567-f610403553a4?w=400', p: 'videoPage' },
            'Photos': { img: 'https://images.unsplash.com/photo-1554080353-a576cf803bda?w=400', p: 'photoPage' },
            'Music': { img: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400', p: 'musicPage' },
            'Messages': { img: 'https://images.unsplash.com/photo-1577563906417-45a18e029474?w=400', p: 'chatPage' },
            'Requests': { img: 'https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=400', p: 'requestPage' }
        };

        function renderMenu() {
            const m = document.getElementById('menuGrid');
            m.innerHTML = "";
            app.order.forEach(k => {
                m.innerHTML += `
                <div class="hub-card" onclick="showPage('${config[k].p}')">
                    <img src="${config[k].img}">
                    <span>${k}</span>
                </div>`;
            });
        }

        // --- 4. FEED & CONTENT ---
        function processFile(e) {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onload = (ev) => {
                let t = f.type.startsWith('video') ? 'video' : (f.type.startsWith('audio') ? 'music' : 'photo');
                app.posts.push({ id: Date.now(), t, src: ev.target.result, u: me.nick, likes: [], comments: [] });
                save(); renderFeeds(); alert("Uploaded!");
            };
            r.readAsDataURL(f);
        }

        function renderFeeds() {
            const v = document.getElementById('videoFeed'), p = document.getElementById('photoFeed'), m = document.getElementById('musicFeed');
            v.innerHTML = ""; p.innerHTML = ""; m.innerHTML = "";

            app.posts.forEach(i => {
                let del = isAdm ? `<button onclick="delPost(${i.id})" style="color:red; background:none; border:none;">[X]</button>` : "";
                let liked = i.likes.includes(me.email) ? 'active' : '';
                
                if(i.t === 'video') {
                    v.innerHTML += `
                    <div class="video-container">
                        <div style="padding:10px; display:flex; justify-content:space-between;"><b>${i.u}</b> ${del}</div>
                        <div class="video-wrapper"><video src="${i.src}" loop muted playsinline></video></div>
                        <div class="post-actions">
                            <span class="like-btn ${liked}" onclick="toggleLike(${i.id})">❤️</span>
                            <span style="font-size:14px;">${i.likes.length} Likes</span>
                        </div>
                        <div style="padding:0 15px;">
                            ${i.comments.slice(-2).map(c => `<div style="font-size:12px;"><b>${c.u}:</b> ${c.t}</div>`).join("")}
                            <input placeholder="Add comment..." style="padding:8px; font-size:12px;" onkeypress="if(event.key==='Enter') addComm(${i.id}, this)">
                        </div>
                    </div>`;
                } else if(i.t === 'photo') {
                    p.innerHTML += `<div style="position:relative; background:#111; border-radius:10px; overflow:hidden;"><img src="${i.src}" style="width:100%;"><div onclick="toggleLike(${i.id})" style="position:absolute; bottom:5px; right:5px; background:rgba(0,0,0,0.5); padding:5px; border-radius:50%; cursor:pointer;">${liked?'❤️':'🤍'}</div></div>`;
                } else if(i.t === 'music') {
                    m.innerHTML += `<div style="background:#111; padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid #222;"><b>${i.u}</b><br><audio src="${i.src}" controls style="width:100%; margin-top:10px;"></audio></div>`;
                }
            });
        }

        function toggleLike(id) {
            let p = app.posts.find(x => x.id === id);
            if(p.likes.includes(me.email)) p.likes = p.likes.filter(l => l !== me.email);
            else p.likes.push(me.email);
            save(); renderFeeds();
        }

        function addComm(id, inp) {
            if(!inp.value) return;
            app.posts.find(x => x.id === id).comments.push({ u: me.nick, t: inp.value });
            inp.value = ""; save(); renderFeeds();
        }

        function runAutoplay() {
            const vids = document.querySelectorAll('video');
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => { if(e.isIntersecting) e.target.play().catch(()=>{}); else e.target.pause(); });
            }, { threshold: 0.6 });
            vids.forEach(v => obs.observe(v));
        }

        // --- 5. CHAT & REQUESTS ---
        function sendChat() {
            let i = document.getElementById('chatInput');
            if(!i.value) return;
            app.chats.push({ u: me.nick, e: me.email, t: i.value });
            i.value = ""; save(); renderChats();
        }

        function renderChats() {
            const b = document.getElementById('chatBox');
            b.innerHTML = app.chats.map(c => `
                <div style="background:${c.e===me.email?'#ff0050':'#222'}; padding:12px; border-radius:15px; align-self:${c.e===me.email?'flex-start':'flex-end'}; max-width:85%;">
                    <small style="opacity:0.6; font-size:10px;">${c.u}</small><br>${c.t}
                </div>`).join("");
            b.scrollTop = b.scrollHeight;
        }

        function postRequest() {
            let t = document.getElementById('reqInp').value;
            if(!t) return;
            app.requests.push({ u: me.nick, t });
            document.getElementById('reqInp').value = ""; save(); alert("Sent!");
        }

        // --- 6. ADMIN SYSTEM ---
        function accessAdmin() {
            if(document.getElementById('adminKey').value === "1234") {
                isAdm = true;
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                renderAdmin();
            }
        }

        function renderAdmin() {
            document.getElementById('statVisits').innerText = app.visits;
            document.getElementById('statUsers').innerText = app.users.length;
            
            const re = document.getElementById('reorderArea');
            re.innerHTML = app.order.map((n, i) => `
                <div style="display:flex; justify-content:space-between; background:#222; padding:10px; margin-bottom:5px; border-radius:8px;">
                    ${n} <div><span onclick="move(${i},-1)">🔼</span> <span onclick="move(${i},1)">🔽</span></div>
                </div>`).join("");

            const ul = document.getElementById('userManagementList');
            ul.innerHTML = app.users.map(u => `
                <div class="user-row">
                    <span>${u.nick}</span>
                    <button class="ban-btn" onclick="toggleBan('${u.email}')">${app.banned.includes(u.email)?'Unban':'Ban'}</button>
                </div>`).join("");

            document.getElementById('adminReqList').innerHTML = app.requests.map(r => `<p><b>${r.u}:</b> ${r.t}</p>`).join("");
        }

        function move(idx, dir) {
            let t = idx + dir;
            if(t < 0 || t >= app.order.length) return;
            [app.order[idx], app.order[t]] = [app.order[t], app.order[idx]];
            save(); renderAdmin(); renderMenu();
        }

        function toggleBan(e) {
            if(app.banned.includes(e)) app.banned = app.banned.filter(x => x !== e);
            else app.banned.push(e);
            save(); renderAdmin();
        }

        function delPost(id) {
            app.posts = app.posts.filter(x => x.id !== id);
            save(); renderFeeds();
        }

        function fullReset() { if(confirm("DELETE ALL DATA?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
                                                                   </html>
