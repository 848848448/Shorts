<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Empire - Fixed & Fast</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        :root { --primary: #ff0050; --bg: #000; --card: #1a1a1a; }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        /* Header */
        header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid #222; }
        .logo { font-size: 24px; font-weight: bold; }

        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        nav b { font-size: 25px; cursor: pointer; font-style: normal; }

        /* Pages */
        .page { display: none; height: calc(100vh - 120px); overflow-y: auto; padding: 15px; }
        .active { display: block; }

        /* 4 Big Boxes */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .box { background: var(--card); border-radius: 15px; height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #333; }
        .box i { font-size: 40px; margin-bottom: 10px; font-style: normal; }

        /* Reels (Instagram Style) */
        #reels-view { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; }
        .reel video { width: 100%; height: 100%; object-fit: cover; }
        .reel-meta { position: absolute; bottom: 80px; left: 15px; text-shadow: 0 0 5px #000; }

        /* Simple Upload Form */
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; }
        .btn { width: 100%; padding: 15px; background: var(--primary); border: none; color: #fff; font-weight: bold; border-radius: 8px; }

        .close-btn { position: fixed; top: 20px; left: 20px; z-index: 3000; font-size: 30px; background: rgba(0,0,0,0.5); border-radius: 50%; width: 40px; height: 40px; text-align: center; line-height: 40px; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 10px; opacity: 0.6;" id="clock">00:00:00</div>
        <div class="logo" id="main-symbol">💎</div>
    </header>

    <div id="home-pg" class="page active">
        <div class="grid">
            <div class="box" onclick="showReels()"><i>🎬</i>ווידעאס</div>
            <div class="box" onclick="openSec('music')"><i>🎵</i>מוזיק</div>
            <div class="box" onclick="openSec('pics')"><i>🖼️</i>בילדער</div>
            <div class="box" onclick="openSec('text')"><i>✍️</i>טעקסט</div>
        </div>
    </div>

    <div id="sec-pg" class="page">
        <h2 id="sec-title"></h2>
        <div id="sec-list"></div>
    </div>

    <div id="reels-view">
        <div class="close-btn" onclick="closeReels()">✕</div>
        <div id="reels-list"></div>
    </div>

    <div id="set-pg" class="page">
        <h2>אדמין & סעטינגס</h2>
        <input type="password" id="admin-pass" placeholder="Password">
        <button class="btn" onclick="checkAdmin()">Login</button>
        <div id="admin-tools" style="display:none; margin-top:20px; border:1px solid gold; padding:10px;">
            <input type="text" id="new-sym" placeholder="טויש סימבאל (Emoji)">
            <button class="btn" onclick="saveSym()">Update Symbol</button>
        </div>
    </div>

    <div id="up-pg" class="page">
        <h2>ארויפלייגן (Upload)</h2>
        <input type="text" id="up-title" placeholder="נאמען פונעם פייל">
        <select id="up-type">
            <option value="videos">ווידעא (Reels)</option>
            <option value="music">מוזיק</option>
            <option value="pics">בילדער</option>
            <option value="text">טעקסט</option>
        </select>
        <input type="file" id="up-file" accept="video/*,audio/*,image/*">
        <button class="btn" id="up-btn" onclick="uploadFile()">Upload Now!</button>
    </div>

    <nav>
        <b onclick="nav('home')">🏠</b>
        <b onclick="showReels()">🎬</b>
        <b onclick="nav('up')">⊕</b>
        <b onclick="nav('set')">⚙️</b>
    </nav>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAmKpAnoV_aG_3_rGMf4l_FzcbAWzwHTnY",
            authDomain: "flutter-ai-playground-8cfec.firebaseapp.com",
            databaseURL: "https://flutter-ai-playground-8cfec-default-rtdb.firebaseio.com",
            projectId: "flutter-ai-playground-8cfec",
            storageBucket: "flutter-ai-playground-8cfec.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), storage = firebase.storage();

        function init() {
            setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
            db.ref('appConfig/symbol').on('value', s => document.getElementById('main-symbol').innerText = s.val() || "💎");
            db.ref('content').on('value', s => { window.data = s.val() || {}; });
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById(p + '-pg').classList.add('active');
            if(p !== 'home') closeReels();
        }

        function uploadFile() {
            const file = document.getElementById('up-file').files[0];
            const title = document.getElementById('up-title').value;
            const type = document.getElementById('up-type').value;
            if(!file || !title) return alert("פעלט דאטא!");

            const btn = document.getElementById('up-btn');
            btn.innerText = "ארבעט... ⏳";
            btn.disabled = true;

            const ref = storage.ref('uploads/' + Date.now() + "_" + file.name);
            ref.put(file).then(s => s.ref.getDownloadURL()).then(url => {
                db.ref('content').push({ title, url, type, time: Date.now() });
                alert("סוקסעס! ארויף!");
                btn.innerText = "Upload Now!";
                btn.disabled = false;
                nav('home');
            }).catch(e => { alert("Error: " + e.message); btn.disabled = false; });
        }

        function showReels() {
            const list = document.getElementById('reels-list');
            list.innerHTML = '';
            const sym = document.getElementById('main-symbol').innerText;
            
            Object.keys(data).reverse().forEach(id => {
                if(data[id].type === 'videos') {
                    list.innerHTML += `
                        <div class="reel">
                            <div style="position:absolute; top:20px; right:20px; z-index:10; opacity:0.5;">${sym}</div>
                            <video src="${data[id].url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                            <div class="reel-meta"><h3>${data[id].title}</h3></div>
                        </div>`;
                }
            });
            document.getElementById('reels-view').style.display = 'block';
        }

        function closeReels() {
            document.getElementById('reels-view').style.display = 'none';
            document.querySelectorAll('video').forEach(v => v.pause());
        }

        function openSec(type) {
            nav('sec');
            document.getElementById('sec-title').innerText = type.toUpperCase();
            const list = document.getElementById('sec-list');
            list.innerHTML = '';
            for(let id in data) {
                if(data[id].type === type) {
                    list.innerHTML += `<div style="background:#222; padding:15px; margin-bottom:10px; border-radius:10px;">${data[id].title}</div>`;
                }
            }
        }

        function checkAdmin() {
            if(document.getElementById('admin-pass').value === "1234") {
                document.getElementById('admin-tools').style.display = 'block';
            }
        }

        function saveSym() {
            db.ref('appConfig').update({ symbol: document.getElementById('new-sym').value });
            alert("Updated!");
        }

        init();
    </script>
</body>
    </html>
