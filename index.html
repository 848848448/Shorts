<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire Social - Instagram Style</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        :root { --primary: #ff0050; --bg: #000; --card: #1c1c1e; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; height: 100vh; }

        /* App Layout */
        #app-container { height: 100vh; display: flex; flex-direction: column; }
        .main-content { flex: 1; overflow-y: auto; position: relative; }

        /* Header */
        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 0.5px solid #333; background: #000; }
        #logo-display { font-size: 24px; font-weight: bold; }
        .header-stats { font-size: 11px; color: #888; }

        /* 4 Categories Grid */
        .grid-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .cat-item { background: var(--card); border-radius: 12px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 600; border: 0.5px solid #333; }
        .cat-item:active { transform: scale(0.96); opacity: 0.8; }
        .cat-item i { font-size: 40px; margin-bottom: 10px; font-style: normal; }

        /* Instagram Reels Full Screen */
        #reels-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel-item { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        .reel-item video { width: 100%; height: 100%; object-fit: cover; }
        
        .reel-controls { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .reel-icon { font-size: 28px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .reel-text { position: absolute; bottom: 100px; left: 15px; text-align: right; z-index: 10; width: 70%; text-shadow: 0 1px 3px #000; }

        /* Settings & Admin */
        .page-view { display: none; padding: 20px; height: 100%; overflow-y: auto; background: #000; }
        .input-box { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; font-size: 16px; }
        .action-btn { width: 100%; padding: 15px; border-radius: 8px; background: var(--primary); color: white; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        /* Admin Panel Box */
        #admin-panel { margin-top: 25px; border: 1px solid gold; padding: 15px; border-radius: 10px; display: none; }

        /* Navigation */
        nav { height: 60px; background: #000; border-top: 0.5px solid #333; display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; }
        nav span { font-size: 24px; cursor: pointer; }

        /* Empty State */
        .empty-msg { text-align: center; margin-top: 50px; color: #555; }
    </style>
</head>
<body>

    <div id="app-container">
        <header class="header">
            <div class="header-stats">
                <div id="clock">00:00:00</div>
                <div>Online: <span id="on-val">1</span></div>
            </div>
            <div id="logo-display">💎</div>
        </header>

        <main class="main-content">
            <div id="home-pg" class="page-view" style="display:block;">
                <div class="grid-wrapper">
                    <div class="cat-item" onclick="openReels()"><i>🎬</i>ווידעאס</div>
                    <div class="cat-item" onclick="openSection('music')"><i>🎵</i>מוזיק</div>
                    <div class="cat-item" onclick="openSection('pics')"><i>🖼️</i>פוקטשערס</div>
                    <div class="cat-item" onclick="openSection('text')"><i>✍️</i>טעקסט</div>
                </div>
            </div>

            <div id="section-pg" class="page-view">
                <button onclick="nav('home')" style="color:var(--primary); background:none; border:none; margin-bottom:20px;">✕ צוריק</button>
                <h2 id="sec-title">Section</h2>
                <div id="sec-list"></div>
            </div>

            <div id="settings-pg" class="page-view">
                <h2>סעטינגס</h2>
                <input type="text" id="nick-in" class="input-box" placeholder="דיין נאמען">
                <button class="action-btn" onclick="saveNick()">Update Name</button>
                
                <div style="margin-top:40px;">
                    <input type="password" id="pass-in" class="input-box" placeholder="Admin Password">
                    <button class="action-btn" style="background:#333" onclick="doAdmin()">Admin Login</button>
                </div>

                <div id="admin-panel">
                    <h3 style="color:gold">Admin Controls</h3>
                    <label>Main Symbol (Emoji)</label>
                    <input type="text" id="adm-sym" class="input-box" placeholder="💎">
                    <button class="action-btn" onclick="saveAdmin()">Save Global Settings</button>
                    <button class="action-btn" style="background:red; margin-top:10px;" onclick="toggleMT()">Toggle Maintenance</button>
                </div>
            </div>
        </main>

        <div id="reels-overlay">
            <div style="position:fixed; top:20px; left:20px; z-index:6000; font-size:30px; color:white; text-shadow: 0 0 10px #000;" onclick="closeReels()">✕</div>
            <div id="reels-list"></div>
        </div>

        <div id="up-modal" class="page-view" style="position:fixed; inset:0; z-index:8000; display:none;">
            <h2>ארויפלייגן פרישע זאכן</h2>
            <input type="text" id="up-name" class="input-box" placeholder="טיטל / נאמען">
            <select id="up-type" class="input-box">
                <option value="videos">Video</option>
                <option value="music">Music</option>
                <option value="pics">Picture</option>
                <option value="text">Text Message</option>
            </select>
            <input type="file" id="up-file" class="input-box">
            <button id="up-go" class="action-btn" onclick="uploadNow()">Upload Now! 🚀</button>
            <button onclick="closeUp()" style="background:none; border:none; color:white; width:100%; margin-top:10px;">Cancel</button>
        </div>

        <nav>
            <span onclick="nav('home')">🏠</span>
            <span onclick="openReels()">🎬</span>
            <span onclick="openUp()">⊕</span>
            <span onclick="nav('settings')">⚙️</span>
        </nav>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAmKpAnoV_aG_3_rGMf4l_FzcbAWzwHTnY",
            authDomain: "flutter-ai-playground-8cfec.firebaseapp.com",
            databaseURL: "https://flutter-ai-playground-8cfec-default-rtdb.firebaseio.com",
            projectId: "flutter-ai-playground-8cfec",
            storageBucket: "flutter-ai-playground-8cfec.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), storage = firebase.storage();

        let isAdmin = false;

        function init() {
            // Live Clock
            setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
            
            // Global App Info
            db.ref('appConfig').on('value', s => {
                const c = s.val() || {};
                document.getElementById('logo-display').innerText = c.symbol || "💎";
            });

            // Content Listener
            db.ref('content').on('value', s => { window.masterData = s.val() || {}; });

            // Online Users
            const onRef = db.ref('online').push(true);
            onRef.onDisconnect().remove();
            db.ref('online').on('value', s => document.getElementById('on-val').innerText = s.numChildren());
        }

        function nav(p) {
            document.querySelectorAll('.page-view').forEach(v => v.style.display = 'none');
            document.getElementById(p + '-pg').style.display = 'block';
            closeReels();
        }

        // --- REELS SYSTEM ---
        function openReels() {
            const list = document.getElementById('reels-list');
            list.innerHTML = '';
            let hasVids = false;
            const sym = document.getElementById('logo-display').innerText;

            for(let id in masterData) {
                if(masterData[id].type === 'videos') {
                    hasVids = true;
                    list.innerHTML += `
                        <div class="reel-item">
                            <div style="position:absolute; top:20px; right:20px; opacity:0.6; z-index:100;">${sym}</div>
                            <video src="${masterData[id].url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                            <div class="reel-text"><h3>${masterData[id].name}</h3></div>
                            <div class="reel-controls">
                                <div class="reel-icon">❤️</div>
                                <div class="reel-icon">💬</div>
                                ${isAdmin ? `<button onclick="del('${id}')" style="background:red; color:white; border:none; padding:5px; border-radius:5px;">DEL</button>` : ''}
                            </div>
                        </div>`;
                }
            }
            if(!hasVids) list.innerHTML = '<div class="empty-msg">נאכנישט דא קיין ווידעאס... לייג עפעס ארויף!</div>';
            document.getElementById('reels-overlay').style.display = 'block';
        }

        function closeReels() {
            document.getElementById('reels-overlay').style.display = 'none';
            document.querySelectorAll('video').forEach(v => v.pause());
        }

        // --- OTHER SECTIONS ---
        function openSection(type) {
            nav('section');
            document.getElementById('sec-title').innerText = type.toUpperCase();
            const list = document.getElementById('sec-list');
            list.innerHTML = '';
            for(let id in masterData) {
                if(masterData[id].type === type) {
                    list.innerHTML += `<div class="cat-item" style="height:80px; margin-bottom:10px; flex-direction:row; padding:15px; justify-content:space-between;">
                        <span>${masterData[id].name}</span>
                        ${isAdmin ? `<button onclick="del('${id}')" style="color:red; background:none; border:none;">Delete</button>` : ''}
                    </div>`;
                }
            }
        }

        // --- UPLOAD SYSTEM ---
        function openUp() { document.getElementById('up-modal').style.display = 'block'; }
        function closeUp() { document.getElementById('up-modal').style.display = 'none'; }

        function uploadNow() {
            const file = document.getElementById('up-file').files[0];
            const name = document.getElementById('up-name').value;
            const type = document.getElementById('up-type').value;
            if(!file || !name) return alert("פעלט נאמען אדער פייל");

            const btn = document.getElementById('up-go');
            btn.innerText = "Uploading... 🚀";
            btn.disabled = true;

            const ref = storage.ref('empire_media/' + Date.now() + "_" + file.name);
            ref.put(file).then(s => s.ref.getDownloadURL()).then(url => {
                db.ref('content').push({ name, url, type, time: Date.now() });
                alert("Upload Success!");
                btn.innerText = "Upload Now! 🚀";
                btn.disabled = false;
                closeUp();
            }).catch(e => alert("Error: " + e.message));
        }

        // --- ADMIN ---
        function doAdmin() {
            if(document.getElementById('pass-in').value === "1234") {
                isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                alert("שלום באס!");
            }
        }

        function saveAdmin() {
            db.ref('appConfig').update({ symbol: document.getElementById('adm-sym').value });
            alert("Settings Saved!");
        }

        function del(id) { if(confirm("Delete this?")) db.ref('content/' + id).remove(); }
        function saveNick() { localStorage.setItem('user', document.getElementById('nick-in').value); alert("Saved!"); }

        init();
    </script>
</body>
    </html>
