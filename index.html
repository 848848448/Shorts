<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE EMPIRE 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="upload-progress-container" class="hidden">
        <div id="upload-progress-bar">0%</div>
    </div>

    <div id="story-viewer" class="hidden">
        <div class="story-header">
            <div id="story-progress-container" class="progress-container"></div>
            <div class="story-user-info">
                <span id="story-username">Username</span>
                <i class="fas fa-times" onclick="closeStory()" style="margin-right: auto; cursor: pointer;"></i>
            </div>
        </div>
        <div class="story-nav nav-left" onclick="prevStory()"></div>
        <div class="story-nav nav-right" onclick="nextStory()"></div>
        <img id="story-img" src="" alt="Status">
    </div>

    <div id="app-container">
        <header>
            <div class="header-top">
                <div class="logo">THE EMPIRE</div>
                <div class="header-icons">
                    <i class="fas fa-search" onclick="toggleSearch()"></i>
                    <i class="fas fa-cog" onclick="showPage('settings-page')"></i>
                </div>
            </div>
            <div id="search-bar-container" class="hidden">
                <input type="text" id="global-search" placeholder="זוך...">
            </div>
            <div class="trending-bar">
                <marquee id="trending-text">🔥 ברוכים הבאים צו די גרעסטע אימפּעריע! 🔥</marquee>
            </div>
        </header>

        <main id="home-page" class="page">
            <div class="status-wrapper">
                <div class="status-list" id="status-list">
                    <div class="status-item" onclick="triggerUpload('status')">
                        <div class="plus-icon"><i class="fas fa-plus"></i></div>
                        <p>Status</p>
                    </div>
                    </div>
            </div>

            <div class="categories-grid">
                <div class="cat-card shorts" onclick="showPage('shorts-page')">
                    <i class="fas fa-play-circle"></i>
                    <h3>SHORTS</h3>
                </div>
                <div class="cat-card music" onclick="showPage('music-page')">
                    <i class="fas fa-music"></i>
                    <h3>MUSIC</h3>
                </div>
                <div class="cat-card chat" onclick="showPage('chat-page')">
                    <i class="fas fa-comments"></i>
                    <h3>CHAT</h3>
                </div>
                <div class="cat-card photos" onclick="showPage('photos-page')">
                    <i class="fas fa-camera-retro"></i>
                    <h3>PHOTOS</h3>
                </div>
            </div>
        </main>

        <section id="chat-page" class="page hidden">
            <div class="page-header">
                <i class="fas fa-arrow-right" onclick="showPage('home-page')"></i>
                <h2>Chat</h2>
            </div>
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="שרייב א מעסעדזש...">
                <button onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>

        <section id="settings-page" class="page hidden">
            <div class="page-header"><i class="fas fa-arrow-right" onclick="showPage('home-page')"></i><h2>סעטינגס</h2></div>
            <div class="settings-list">
                <label>ניקנעים:</label>
                <input type="text" id="user-nickname">
                <label>קאָליר:</label>
                <input type="color" id="user-color">
                <button class="save-btn" onclick="saveUserSettings()">סייוו</button>
                <div id="admin-entry" class="hidden">
                    <button class="admin-btn" onclick="showPage('admin-page')">ADMIN CONTROL</button>
                </div>
            </div>
        </section>

        <section id="admin-page" class="page hidden">
            <div class="page-header"><i class="fas fa-arrow-right" onclick="showPage('settings-page')"></i><h2>Admin</h2></div>
            <div class="admin-grid">
                <button onclick="manageContent('messages')">מעקן טשעט</button>
                <button onclick="manageContent('shorts')">מעקן שאָרץ</button>
                <button onclick="manageContent('status')">מעקן סטעיטוסעס</button>
            </div>
        </section>
    </div>

    <input type="file" id="file-upload-input" class="hidden">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
    </html>
