<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Chat Only</title>
    <style>
        /* 📱 פולע מאָביל פירסט סטרוקטור - קיין סקראָלן אינדרויסן פונעם סקרין */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: Arial, sans-serif;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* דער הויפט פאון קאַנטיינער */
        .wrapper {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background: #0b141a;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 🔝 די שורה גאַנץ אויבן: מיט אן ארויסגיין קנעפּל און גרופּעס אָפּציעס */
        .chat-header {
            background: #202c33;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            border-bottom: 1px solid #2f3b43;
        }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .back-btn { background: none; border: none; color: #007fff; font-size: 20px; cursor: pointer; font-weight: bold; }
        .chat-title { font-size: 16px; font-weight: bold; }
        
        /* קנעפּלעך צו עפילן / טוישן גרופּעס */
        .group-selectors {
            display: flex;
            gap: 8px;
            padding: 8px 15px;
            background: #111b21;
            border-bottom: 1px solid #222c32;
            overflow-x: auto;
        }
        .group-btn {
            background: #202c33; border: 1px solid #374248; color: #aebac1;
            padding: 6px 12px; border-radius: 15px; font-size: 13px; cursor: pointer; white-space: nowrap;
        }
        .group-btn.active { background: #005c4b; color: #fff; border-color: #00a884; }

        /* 💬 דער פלאץ וווּ די מעסעדזשעס לויפן */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 20px;
        }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 75%; font-size: 15px; word-wrap: break-word; }
        .msg.me { background: #005c4b; align-self: flex-start; text-align: right; }
        .msg.them { background: #202c33; align-self: flex-end; text-align: right; }

        /* 📌 פונקטליכע אונטערשטע שורה: זיצט FIXED גאַנץ אונטן פונעם פֿאָון סקרין */
        .chat-footer {
            background: #202c33;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 60px;
        }
        .file-manager-btn {
            background: none; border: none; color: #8696a0; font-size: 24px; cursor: pointer; padding: 0 5px;
        }
        .input-text-field {
            flex: 1;
            padding: 12px;
            background: #2a3942;
            border: none;
            color: #fff;
            border-radius: 8px;
            font-size: 15px;
            text-align: right;
            outline: none;
        }
        .send-action-btn {
            background: #00a884; border: none; width: 40px; height: 40px; 
            border-radius: 50%; color: #fff; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <div class="chat-header">
            <div class="header-right">
                <button class="back-btn" onclick="alert('ארויסגיין באָטן געקליקט!')">➔</button>
                <div class="chat-title" id="activeChatName">הויפט גרופע</div>
            </div>
            <span style="color: #8696a0; font-size: 13px;" id="typingIndicator"></span>
        </div>

        <div class="group-selectors">
            <button class="group-btn active" onclick="changeGroup('main', 'הויפט גרופע')">👥 הויפט גרופע</button>
            <button class="group-btn" onclick="changeGroup('group2', 'שמועסן גרופע 2')">👥 גרופע 2</button>
            <button class="group-btn" onclick="alert('עפענען א נייע גרופע!')">➕ נייע גרופע</button>
        </div>

        <div class="chat-box" id="messagesContainer">
            <div class="msg them"><b>משה:</b> שלום עליכם! דא קומען די מעסעדזשעס.</div>
            <div class="msg me">עליכם השלום! דא שרייבסטו.</div>
        </div>

        <div class="chat-footer">
            <button class="file-manager-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="file" id="fileInput" style="display: none;">
            
            <input type="text" id="messageInputField" placeholder="שרייב א מעסעדזש...">
            <button class="send-action-btn">➡️</button>
        </div>

    </div>

</body>
    </html>
