<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Ultimate Video App</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #007bff; --bg: #000000; --card: #121212; --text: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        /* Header & Announcement */
        header { background: #000; padding: 15px; border-bottom: 1px solid #333; font-weight: bold; font-size: 20px; text-align: center; }
        .announcement { background: #ff4500; padding: 10px; font-weight: bold; text-align: center; font-size: 14px; }

        /* Grid - Same as yesterday */
        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .box { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; position: relative; }
        .box img { width: 100%; height: 180px; object-fit: cover; background: #1a1a1a; display: block; }
        .box-info { padding: 10px; text-align: right; }
        .box-title { font-weight: bold; font-size: 15px; margin-bottom: 4px; }
        .view-count { font-size: 12px; color: #888; }
        .live-badge { position: absolute; top: 10px; left: 10px; background: red; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }

        /* Leaderboard & Chat Pages */
        .page { display: none; padding: 15px; }
        .active { display: block; }
        .leader-item { display: flex; justify-content: space-between; background: #111; margin: 8px 0; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        
        #chat-box { height: 350px; overflow-y: auto; background: #080808; border: 1px solid #333; margin: 10px 0; padding: 15px; text-align: right; border-radius: 12px; }
        .msg { background: #1a1a1a; padding: 10px; margin: 8px 0; border-radius: 10px; border-right: 4px solid var(--primary); }

        /* Video Player Overlay */
        #video-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; display:none; flex-direction:column; justify-content: center; }
        video { width: 100%; max-height: 90%; }
        .close-btn { position:absolute; top:20px; left:20px; background:rgba(255,255,255,0.2); color:white; border:none; padding:12px 18px; border-radius:50%; z-index:2100; font-size: 20px; }

        /* Bottom Nav */
        nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        nav span { cursor: pointer; font-size: 24px; opacity: 0.5; }
        nav span.active-nav { opacity: 1; color: var(--primary); }

        /* Admin UI */
        input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; }
        button { background: var(--primary); border: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>MY VIDEO APP</header>
    <div id="ann-bar" class="announcement">לאָדט זיך...</div>

    <div id="home-page" class="page active">
        <div id="main-container" class="container"></div>
    </div>

    <div id="lead-page" class="page">
        <h3 style="text-align: center;">🏆 טאַפּ ווידעאָס</h3>
        <div id="leader-list"></div>
    </div>

    <div id="request-page" class="page">
        <h3 style="text-align: center;">💬 ריקוועסטס & קאָמאַנדס</h3>
        <div id="chat-box"></div>
        <input type="text" id="user-msg" placeholder="שרייב עפעס...">
        <button onclick="sendRequest()">שיקן ✉️</button>
    </div>

    <div id="settings-page" class="page">
        <div id="login-area">
            <input type="password" id="pass" placeholder="Admin Password">
            <button onclick="checkAdmin()">Login</button>
        </div>
        <div id="admin-tools" style="display:none;">
            <h4>אדמין פאַנעל</h4>
            <input type="text" id="new-name" placeholder="נאמען">
            <input type="text" id="new-url" placeholder="ווידעא לינק (.mp4)">
            <input type="text" id="new-img" placeholder="בילד לינק (Poster)">
            <button onclick="addBox()">לייג צו ווידעא +</button>
            <hr>
            <input type="text" id="new-ann" placeholder="טויש מעלדונג">
            <button onclick="setAnn()">Update Announcement</button>
            <button onclick="clearChat()" style="background:red;">ריין אויס טשעט</button>
            <div id="admin-manage-list"></div>
        </div>
    </div>

    <div id="video-overlay">
        <button class="close-btn" onclick="closeVideo()">✕</button>
        <video id="player" controls playsinline loop></video>
    </div>

    <nav>
        <span id="nav-home" class="active-nav" onclick="showPage('home')">🏠</span>
        <span id="nav-lead" onclick="showPage('lead')">🏆</span>
        <span id="nav-request" onclick="showPage('request')">💬</span>
        <span id="nav-settings" onclick="showPage('settings')">⚙️</span>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAmKpAnoV_aG_3_rGMf4l_FzcbAWzwHTnY",
          authDomain: "flutter-ai-playground-8cfec.firebaseapp.com",
          databaseURL: "https://flutter-ai-playground-8cfec-default-rtdb.firebaseio.com",
          projectId: "flutter-ai-playground-8cfec",
          storageBucket: "flutter-ai-playground-8cfec.firebasestorage.app",
          messagingSenderId: "989658103041",
          appId: "1:989658103041:web:f33b1ed6d748ef98b96f00"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function init() {
            // Load Announcement
            db.ref('announcement').on('value', s => { document.getElementById('ann-bar').innerText = s.val() || "Welcome"; });

            // Load Boxes & Leaderboard
            db.ref('boxes').on('value', snap => {
                const container = document.getElementById('main-container');
                const leadList = document.getElementById('leader-list');
                const adminList = document.getElementById('admin-manage-list');
                container.innerHTML = ''; adminList.innerHTML = '';
                let items = [];

                snap.forEach(child => {
                    let d = child.val(); d.id = child.key; d.views = d.views || 0;
                    items.push(d);

                    const box = document.createElement('div');
                    box.className = 'box';
                    box.innerHTML = `<div class="live-badge">LIVE</div><img src="${d.image || ''}"><div class="box-info"><div class="box-title">${d.name}</div><div class="view-count">👁️ ${d.views}</div></div>`;
                    box.onclick = () => {
                        db.ref('boxes/'+d.id+'/views').transaction(v => (v||0)+1);
                        document.getElementById('video-overlay').style.display='flex';
                        document.getElementById('player').src = d.url;
                        document.getElementById('player').play();
                    };
                    container.appendChild(box);

                    const adminItem = document.createElement('div');
                    adminItem.innerHTML = `<p>${d.name} <button style="width:auto; padding:5px; background:red;" onclick="db.ref('boxes/${d.id}').remove()">Delete</button></p>`;
                    adminList.appendChild(adminItem);
                });

                // Leaderboard
                leadList.innerHTML = '';
                items.sort((a,b) => b.views - a.views).forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'leader-item';
                    row.innerHTML = `<span>#${i+1} ${item.name}</span> <span>${item.views} Views</span>`;
                    leadList.appendChild(row);
                });
            });

            // Load Chat
            db.ref('requests').on('value', snap => {
                const chat = document.getElementById('chat-box');
                chat.innerHTML = '';
                snap.forEach(c => {
                    const m = document.createElement('div');
                    m.className = 'msg'; m.innerText = c.val().text;
                    chat.appendChild(m);
                });
                chat.scrollTop = chat.scrollHeight;
            });
        }

        function addBox() {
            const name = document.getElementById('new-name').value;
            const url = document.getElementById('new-url').value;
            const img = document.getElementById('new-img').value;
            if(name && url) db.ref('boxes').push({ name, url, image: img, views: 0 });
        }

        function sendRequest() {
            const t = document.getElementById('user-msg').value;
            if(t) { db.ref('requests').push({ text: t }); document.getElementById('user-msg').value = ''; }
        }

        function setAnn() { db.ref('announcement').set(document.getElementById('new-ann').value); }
        function clearChat() { if(confirm("מעקן טשעט?")) db.ref('requests').remove(); }
        function closeVideo() { document.getElementById('video-overlay').style.display='none'; document.getElementById('player').pause(); }
        
        function showPage(p) {
            document.querySelectorAll('.page').forEach(d => d.classList.remove('active'));
            document.querySelectorAll('nav span').forEach(s => s.classList.remove('active-nav'));
            document.getElementById(p + '-page').classList.add('active');
            document.getElementById('nav-' + p).classList.add('active-nav');
        }

        function checkAdmin() { if(document.getElementById('pass').value === '1234') document.getElementById('admin-tools').style.display = 'block'; }

        init();
    </script>
</body>
    </html>
