<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts Hub - VIP Edition</title>
    <style>
        :root { --bg: #000; --text: #fff; --primary: #ff0050; --border: #262626; --card: #121212; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
        .page { display: none; height: 100vh; overflow-y: auto; padding-bottom: 100px; box-sizing: border-box; }
        .active-page { display: block; }
        
        /* Home Hub */
        .hub-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .hub-card { background: var(--card); border-radius: 20px; height: 150px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .hub-card:active { transform: scale(0.95); }
        .hub-card img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; pointer-events: none; }
        .hub-card span { z-index: 2; font-weight: bold; font-size: 20px; text-shadow: 2px 2px 5px #000; }

        /* Content Styles */
        .video-item { width: 100%; border-bottom: 8px solid #111; padding-bottom: 10px; }
        video { width: 100%; aspect-ratio: 9/16; background: #000; object-fit: contain; }
        .actions { padding: 10px; display: flex; gap: 15px; align-items: center; }
        .like-btn { cursor: pointer; font-size: 22px; }

        /* Global UI */
        .header { position: sticky; top: 0; background: rgba(0,0,0,0.9); padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #000; padding: 15px 0; border-top: 1px solid var(--border); }
        .nav-btn { font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="homePage" class="page">
        <div class="header">
            <div style="font-weight:bold; font-size:22px; color:var(--primary);">Shorts Hub</div>
            <div onclick="showPage('settingsPage')">⚙️</div>
        </div>
        <div id="mainMenu" class="hub-container"></div>
    </div>

    <div id="videoPage" class="page">
        <div class="header"><span onclick="showPage('homePage')">←</span> <strong>Shorts</strong></div>
        <div id="videoFeed"></div>
    </div>

    <div id="photoPage" class="page">
        <div class="header"><span onclick="showPage('homePage')">←</span> <strong>Photos</strong></div>
        <div id="photoFeed" style="padding:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
    </div>

    <div id="chatPage" class="page">
        <div class="header"><strong>Messages</strong></div>
        <div id="chatBox" style="padding:15px; height:70vh; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="padding:10px; display:flex; gap:5px; background:#000;">
            <input type="text" id="msgInp" placeholder="שרייב עפעס..." style="margin:0;">
            <button onclick="sendMsg()" style="background:var(--primary); border:none; color:white; padding:0 15px; border-radius:10px;">Send</button>
        </div>
    </div>

    <div id="requestPage" class="page">
        <div class="header"><span onclick="showPage('homePage')">←</span> <strong>Requests</strong></div>
        <div style="padding:20px;">
            <textarea id="reqText" placeholder="וואס זאלן מיר ארויסלייגן?"></textarea>
            <button class="btn" onclick="submitReq()">שיק ריקוועסט</button>
        </div>
    </div>

    <div id="settingsPage" class="page">
        <div class="header"><span onclick="showPage('homePage')">←</span> <strong>Settings</strong></div>
        <div style="padding:20px;">
            <div id="loginArea">
                <h3>Login</h3>
                <input type="text" id="nickInp" placeholder="דיין ניקנעם" autocomplete="off">
                <input type="email" id="mailInp" placeholder="דיין אימעיל" autocomplete="off">
                <button class="btn" onclick="userLogin()">אריינגיין</button>
                <hr style="margin:20px 0; border:0; border-top:1px solid #333;">
                <input type="password" id="admPass" placeholder="Admin Password">
                <button class="btn" style="background:#444;" onclick="adminLogin()">Admin Login</button>
            </div>
            
            <div id="adminPanel" style="display:none;">
                <h2 style="color:var(--primary);">Admin Dashboard</h2>
                <div style="background:#111; padding:15px; border-radius:10px; display:flex; justify-content:space-around;">
                    <span>Visits: <b id="statV">0</b></span>
                    <span>Users: <b id="statU">0</b></span>
                </div>
                <h4>Menu Order:</h4>
                <div id="reorderList"></div>
                <h4>Requests:</h4>
                <div id="reqList" style="font-size:12px; color:#888;"></div>
                <button class="btn" style="background:#222; margin-top:20px;" onclick="localStorage.clear(); location.reload();">Full Reset</button>
            </div>
            
            <div id="userProfile" style="display:none; text-align:center;">
                <h3 id="uName"></h3>
                <p id="uMail" style="color:#888;"></p>
                <button class="btn" style="background:#333;" onclick="localStorage.removeItem('active_user'); location.reload();">Logout</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileUp" style="display:none" onchange="doUpload(event)">
    <div class="bottom-nav">
        <div class="nav-btn" onclick="showPage('homePage')">🏠</div>
        <div class="nav-btn" onclick="document.getElementById('fileUp').click()" style="color:var(--primary); font-size:35px;">⊕</div>
        <div class="nav-btn" onclick="showPage('chatPage')">💬</div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('shorts_hub_db')) || {
            users: [], posts: [], chats: [], reqs: [], visits: 0,
            order: ['Videos', 'Photos', 'Chat', 'Requests']
        };
        let currentUser = JSON.parse(localStorage.getItem('active_user')) || null;
        let isAdm = false;

        window.onload = () => {
            db.visits++; save();
            renderMenu();
            renderFeeds();
            renderChats();
            if(currentUser) setupUserUI();
            showPage('homePage');
        };

        function save() { localStorage.setItem('shorts_hub_db', JSON.stringify(db)); }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            if(id === 'videoPage') setTimeout(initAutoplay, 500);
        }

        // --- Auth ---
        function userLogin() {
            let n = document.getElementById('nickInp').value;
            let e = document.getElementById('mailInp').value;
            if(n && e) {
                currentUser = { n, e };
                if(!db.users.find(u => u.e === e)) db.users.push(currentUser);
                localStorage.setItem('active_user', JSON.stringify(currentUser));
                save(); setupUserUI();
            }
        }

        function setupUserUI() {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('userProfile').style.display = 'block';
            document.getElementById('uName').innerText = currentUser.n;
            document.getElementById('uMail').innerText = currentUser.e;
        }

        function adminLogin() {
            if(document.getElementById('admPass').value === '1234') {
                isAdm = true;
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('statV').innerText = db.visits;
                document.getElementById('statU').innerText = db.users.length;
                renderAdmin();
            }
        }

        // --- Menu ---
        const config = {
            'Videos': { img: 'https://images.unsplash.com/photo-1492691523567-f610403553a4?w=200', p: 'videoPage' },
            'Photos': { img: 'https://images.unsplash.com/photo-1554080353-a576cf803bda?w=200', p: 'photoPage' },
            'Chat': { img: 'https://images.unsplash.com/photo-1577563906417-45a18e029474?w=200', p: 'chatPage' },
            'Requests': { img: 'https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=200', p: 'requestPage' }
        };

        function renderMenu() {
            const m = document.getElementById('mainMenu');
            m.innerHTML = db.order.map(k => `
                <div class="hub-card" onclick="showPage('${config[k].p}')">
                    <img src="${config[k].img}">
                    <span>${k}</span>
                </div>`).join("");
        }

        // --- Content ---
        function doUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                let type = file.type.startsWith('video') ? 'v' : 'p';
                db.posts.push({ id: Date.now(), t: type, src: ev.target.result, u: currentUser ? currentUser.n : 'Guest', likes: [] });
                save(); renderFeeds();
            };
            reader.readAsDataURL(file);
        }

        function renderFeeds() {
            const vf = document.getElementById('videoFeed'), pf = document.getElementById('photoFeed');
            vf.innerHTML = ""; pf.innerHTML = "";
            db.posts.forEach(p => {
                let liked = currentUser && p.likes.includes(currentUser.e) ? '❤️' : '🤍';
                if(p.t === 'v') {
                    vf.innerHTML += `
                        <div class="video-item">
                            <video src="${p.src}" loop muted playsinline></video>
                            <div class="actions">
                                <span class="like-btn" onclick="like(${p.id})">${liked}</span>
                                <span>${p.likes.length} likes</span>
                                <small style="margin-left:auto; opacity:0.5;">By ${p.u}</small>
                                ${isAdm ? `<button onclick="delPost(${p.id})">❌</button>` : ''}
                            </div>
                        </div>`;
                } else {
                    pf.innerHTML += `<div style="position:relative;"><img src="${p.src}" style="width:100%; border-radius:10px;">${isAdm ? `<button onclick="delPost(${p.id})" style="position:absolute; top:0;">❌</button>` : ''}</div>`;
                }
            });
        }

        function like(id) {
            if(!currentUser) return alert("ביטע לאג דיך אריין צו לייקן");
            let p = db.posts.find(x => x.id === id);
            if(p.likes.includes(currentUser.e)) p.likes = p.likes.filter(l => l !== currentUser.e);
            else p.likes.push(currentUser.e);
            save(); renderFeeds();
        }

        function initAutoplay() {
            const vids = document.querySelectorAll('video');
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => { if(e.isIntersecting) e.target.play().catch(()=>{}); else e.target.pause(); });
            }, { threshold: 0.6 });
            vids.forEach(v => obs.observe(v));
        }

        // --- Chat & Req ---
        function sendMsg() {
            let i = document.getElementById('msgInp');
            if(!i.value) return;
            db.chats.push({ u: currentUser ? currentUser.n : 'Guest', t: i.value });
            i.value = ""; save(); renderChats();
        }

        function renderChats() {
            document.getElementById('chatBox').innerHTML = db.chats.map(c => `
                <div style="background:#222; padding:10px; border-radius:10px; align-self:flex-start; max-width:80%;">
                    <small style="color:var(--primary); font-size:10px;">${c.u}</small><br>${c.t}
                </div>`).join("");
            document.getElementById('chatBox').scrollTop = 9999;
        }

        function submitReq() {
            let t = document.getElementById('reqText').value;
            if(!t) return;
            db.reqs.push({ u: currentUser ? currentUser.n : 'Guest', t: t });
            document.getElementById('reqText').value = "";
            save(); alert("Sent!");
        }

        // --- Admin Reorder ---
        function renderAdmin() {
            document.getElementById('reorderList').innerHTML = db.order.map((n, i) => `
                <div style="display:flex; justify-content:space-between; padding:10px; background:#222; margin-bottom:5px; border-radius:8px;">
                    ${n} <span onclick="move(${i})">🔼</span>
                </div>`).join("");
            document.getElementById('reqList').innerHTML = db.reqs.map(r => `<p>${r.u}: ${r.t}</p>`).join("");
        }

        function move(i) {
            if(i === 0) return;
            [db.order[i], db.order[i-1]] = [db.order[i-1], db.order[i]];
            save(); renderAdmin(); renderMenu();
        }

        function delPost(id) {
            db.posts = db.posts.filter(p => p.id !== id);
            save(); renderFeeds();
        }
    </script>
</body>
                                </html>
