<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Empire 2.0 - Full Power</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        :root { --primary: #ff0050; --bg: #000; --card: #1c1c1e; --text: #fff; --accent: #0095f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }

        /* Header */
        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; position: sticky; top: 0; background: #000; z-index: 1000; }
        #main-logo-area { font-size: 28px; font-weight: bold; }
        .stats-area { font-size: 12px; color: #888; text-align: left; }

        /* Grid */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; margin-top: 10px; }
        .cat-card { background: var(--card); border-radius: 15px; height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #333; transition: 0.2s; }
        .cat-card:active { transform: scale(0.95); background: #2c2c2e; }
        .cat-icon { font-size: 40px; margin-bottom: 10px; }

        /* Instagram Reels View */
        #reels-view { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel-video { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        .reel-video video { width: 100%; height: 100%; object-fit: cover; }
        .reel-ui { position: absolute; bottom: 80px; right: 20px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .reel-info { position: absolute; bottom: 80px; left: 20px; text-align: right; width: 70%; }

        /* Settings Page - Big & Clear */
        .settings-container { padding: 30px; display: none; }
        .settings-container.active { display: block; }
        h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; }
        input, select { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #111; color: #fff; font-size: 16px; }
        .btn-main { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 18px; margin-top: 10px; }

        /* Admin Dashboard */
        .admin-only { border: 2px solid gold; padding: 20px; border-radius: 15px; margin-top: 30px; display: none; }

        /* Nav */
        nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #333; display: flex; justify-content: space-around; padding: 15px 0; z-index: 2000; }
        nav span { font-size: 26px; cursor: pointer; }

        /* Maintenance Overlay */
        #mt-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <div id="mt-screen">
        <div id="mt-logo" style="font-size: 100px;">💎</div>
        <h1 id="mt-text">סיסטעם ארבעט יעצט</h1>
    </div>

    <header class="header">
        <div class="stats-area">
            <div id="clock">00:00:00</div>
            <div>Online: <span id="on-cnt">1</span></div>
        </div>
        <div id="main-logo-area">💎</div>
    </header>

    <div id="home-page" class="page active">
        <div class="grid-container">
            <div class="cat-card" onclick="showReels()">
                <span class="cat-icon">🎬</span>
                <span>ווידעאס</span>
            </div>
            <div class="cat-card" onclick="nav('music')">
                <span class="cat-icon">🎵</span>
                <span>מוזיק</span>
            </div>
            <div class="cat-card" onclick="nav('pics')">
                <span class="cat-icon">🖼️</span>
                <span>פוקטשערס</span>
            </div>
            <div class="cat-card" onclick="nav('text')">
                <span class="cat-icon">✍️</span>
                <span>טעקסט</span>
            </div>
        </div>
    </div>

    <div id="content-page" class="page" style="display:none; padding:20px;">
        <button onclick="nav('home')">⬅ צוריק</button>
        <h2 id="page-title">סעקציע</h2>
        <div id="content-list"></div>
    </div>

    <div id="reels-view">
        <div style="position:fixed; top:20px; left:20px; z-index:6000; font-size:30px;" onclick="closeReels()">✕</div>
        <div id="reels-container"></div>
    </div>

    <div id="settings-page" class="settings-container">
        <h2>סעטינגס</h2>
        <div class="input-group">
            <label>דיין נאמען</label>
            <input type="text" id="user-name" placeholder="למשל: משה">
            <button class="btn-main" style="background:#444;" onclick="saveName()">Update Profile</button>
        </div>

        <div class="input-group">
            <label>אדמין פעסווארד</label>
            <input type="password" id="admin-key" placeholder="Password">
            <button class="btn-main" onclick="checkAdmin()">Admin Login</button>
        </div>

        <div id="admin-area" class="admin-only">
            <h3>Boss Dashboard 👑</h3>
            <div class="input-group">
                <label>טויש סימבאל (Emoji)</label>
                <input type="text" id="new-sym" placeholder="💎">
            </div>
            <div class="input-group">
                <label>לויפעדיגע מעלדונג</label>
                <input type="text" id="new-ann" placeholder="News...">
            </div>
            <button class="btn-main" onclick="updateApp()">Save Changes</button>
            <button class="btn-main" style="background:red; margin-top:20px;" onclick="toggleMT()">Toggle Maintenance</button>
        </div>
    </div>

    <div id="up-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:7000; padding:40px; flex-direction:column; justify-content:center;">
        <h2>ארויפלייגן</h2>
        <input type="text" id="up-name" placeholder="טיטל">
        <select id="up-type">
            <option value="videos">Video</option>
            <option value="music">Music</option>
            <option value="pics">Picture</option>
        </select>
        <input type="file" id="up-file">
        <button class="btn-main" id="up-go" onclick="doUpload()">Upload Now!</button>
        <button onclick="closeUp()" style="background:none; border:none; color:white; margin-top:20px;">Cancel</button>
    </div>

    <nav>
        <span onclick="nav('home')">🏠</span>
        <span onclick="showReels()">🎬</span>
        <span onclick="openUp()">⊕</span>
        <span onclick="nav('settings')">⚙️</span>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAmKpAnoV_aG_3_rGMf4l_FzcbAWzwHTnY",
            authDomain: "flutter-ai-playground-8cfec.firebaseapp.com",
            databaseURL: "https://flutter-ai-playground-8cfec-default-rtdb.firebaseio.com",
            projectId: "flutter-ai-playground-8cfec",
            storageBucket: "flutter-ai-playground-8cfec.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), storage = firebase.storage();

        let isAdmin = false;

        function init() {
            setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
            
            db.ref('appConfig').on('value', s => {
                const c = s.val() || {};
                document.getElementById('main-logo-area').innerText = c.symbol || "💎";
                document.getElementById('mt-logo').innerText = c.symbol || "💎";
                if(c.mt && !isAdmin) document.getElementById('mt-screen').style.display = 'flex';
                else document.getElementById('mt-screen').style.display = 'none';
            });

            db.ref('content').on('value', s => { window.allContent = s.val() || {}; });
            
            // Online count
            const onlineRef = db.ref('online').push(true);
            onlineRef.onDisconnect().remove();
            db.ref('online').on('value', s => document.getElementById('on-cnt').innerText = s.numChildren());
        }

        function nav(page) {
            document.querySelectorAll('.page, .settings-container').forEach(p => p.style.display = 'none');
            document.getElementById(page + (page === 'settings' ? '-page' : '-page') || 'home-page').style.display = 'block';
            if(page === 'home') document.getElementById('home-page').style.display = 'block';
            if(page === 'music' || page === 'pics' || page === 'text') {
                document.getElementById('content-page').style.display = 'block';
                renderContent(page);
            }
        }

        function renderContent(type) {
            document.getElementById('page-title').innerText = type.toUpperCase();
            const list = document.getElementById('content-list');
            list.innerHTML = '';
            for(let id in allContent) {
                if(allContent[id].type === type) {
                    list.innerHTML += `<div class="cat-card" style="height:80px; margin-bottom:10px;">
                        ${allContent[id].name}
                        ${isAdmin ? `<button onclick="del('${id}')" style="color:red">Delete</button>` : ''}
                    </div>`;
                }
            }
        }

        function showReels() {
            document.getElementById('reels-view').style.display = 'block';
            const cont = document.getElementById('reels-container');
            cont.innerHTML = '';
            const sym = document.getElementById('main-logo-area').innerText;
            for(let id in allContent) {
                if(allContent[id].type === 'videos') {
                    cont.innerHTML += `
                        <div class="reel-video">
                            <div style="position:absolute; top:20px; right:20px; opacity:0.5;">${sym}</div>
                            <video src="${allContent[id].url}" loop onclick="this.paused?this.play():this.pause()"></video>
                            <div class="reel-info"><h3>${allContent[id].name}</h3></div>
                            <div class="reel-ui">
                                <span>❤️</span>
                                <span>💬</span>
                                ${isAdmin ? `<button onclick="del('${id}')" style="background:red; color:white; border:none; border-radius:5px;">DEL</button>` : ''}
                            </div>
                        </div>`;
                }
            }
        }

        function closeReels() {
            document.getElementById('reels-view').style.display = 'none';
            document.querySelectorAll('video').forEach(v => v.pause());
        }

        function openUp() { document.getElementById('up-modal').style.display = 'flex'; }
        function closeUp() { document.getElementById('up-modal').style.display = 'none'; }

        function doUpload() {
            const file = document.getElementById('up-file').files[0];
            const name = document.getElementById('up-name').value;
            const type = document.getElementById('up-type').value;
            if(!file || !name) return alert("פעלט דאטא");

            const btn = document.getElementById('up-go');
            btn.innerText = "Uploading...";
            
            const ref = storage.ref('files/' + Date.now());
            ref.put(file).then(s => s.ref.getDownloadURL()).then(url => {
                db.ref('content').push({ name, url, type, likes: 0 });
                btn.innerText = "Upload Now!";
                closeUp();
                alert("Success!");
            });
        }

        function checkAdmin() {
            if(document.getElementById('admin-key').value === "1234") {
                isAdmin = true;
                document.getElementById('admin-area').style.display = 'block';
                alert("שלום באָס!");
            }
        }

        function updateApp() {
            db.ref('appConfig').update({
                symbol: document.getElementById('new-sym').value,
                ann: document.getElementById('new-ann').value
            });
            alert("Updated!");
        }

        function toggleMT() { db.ref('appConfig/mt').transaction(m => !m); }
        function del(id) { if(confirm("Delete?")) db.ref('content/' + id).remove(); }
        function saveName() { localStorage.setItem('user', document.getElementById('user-name').value); alert("Saved!"); }

        init();
    </script>
</body>
    </html>
