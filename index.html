<!DOCTYPE html>
<html lang="yi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts Pro Ultimate</title>
    <style>
        /* הויפט אויסשטעל */
        body { background: black; color: white; margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        /* אויבערשטע באר (Logo & Search) */
        .top-nav { 
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; 
            padding: 20px; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); 
        }
        .logo { font-size: 24px; font-weight: bold; color: #ff0050; letter-spacing: 1px; }

        /* ווידעא קאנטעינער */
        .video-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; }
        .short { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        video { height: 100%; width: 100%; object-fit: cover; background: #111; }

        /* רעכטע זייט באר (Actions) */
        .side-bar { 
            position: absolute; right: 12px; bottom: 100px; 
            display: flex; flex-direction: column; gap: 20px; align-items: center; 
        }
        .action-item { text-align: center; font-size: 13px; font-weight: 600; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .action-btn { font-size: 32px; background: none; border: none; color: white; cursor: pointer; }

        /* באנוצער אינפארמאציע (אונטן לינקס) */
        .user-info { 
            position: absolute; left: 15px; bottom: 85px; width: 75%; 
            text-shadow: 0px 1px 5px rgba(0,0,0,0.9); 
        }
        .user-name { font-weight: bold; font-size: 17px; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .verify-badge { color: #2196F3; font-size: 14px; }
        .follow-btn { background: #ff0050; color: white; border: none; padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .caption { font-size: 14px; margin-bottom: 10px; line-height: 1.4; }
        
        /* מוזיק דיסק וואס דרייט זיך */
        .music-disk {
            width: 45px; height: 45px; background: radial-gradient(circle, #333, #000);
            border-radius: 50%; border: 4px solid #222;
            animation: spin 3s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* אונטערשטע נאוויגאציע (Menu) */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; 
            align-items: center; background: black; padding: 12px 0; border-top: 0.5px solid #222; z-index: 100; 
        }
        .nav-item { text-align: center; font-size: 10px; color: #888; text-decoration: none; }
        .nav-icon { font-size: 24px; color: white; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="logo">MY SHORTS</div>
        <div style="font-size: 22px;">🔍</div>
    </div>

    <div class="video-container">
        
        <div class="short">
            <video src="video.mp4" loop muted playsinline onclick="this.paused ? this.play() : this.pause()"></video>
            
            <div class="user-info">
                <div class="user-name">
                    @Dian_User <span class="verify-badge">✔</span>
                    <button class="follow-btn">Follow</button>
                </div>
                <div class="caption">ברוכים הבאים צו מיין נייע Shorts עפּ! #Shorts #Viral #WebDev</div>
                <div style="font-size: 13px;">♫ Original Sound - @Dian_User</div>
            </div>

            <div class="side-bar">
                <div class="action-item"><button class="action-btn">❤️</button><p>85.4K</p></div>
                <div class="action-item"><button class="action-btn">💬</button><p>1,240</p></div>
                <div class="action-item"><button class="action-btn">🔗</button><p>Share</p></div>
                <div class="music-disk"></div>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item"><span class="nav-icon">🏠</span>Home</div>
        <div class="nav-item"><span class="nav-icon">🧩</span>Explore</div>
        <div class="nav-item"><span class="nav-icon" style="font-size: 35px; color: #ff0050; font-weight: bold;">+</span></div>
        <div class="nav-item"><span class="nav-icon">📥</span>Inbox</div>
        <div class="nav-item"><span class="nav-icon">👤</span>Profile</div>
    </div>

</body>
</html>
