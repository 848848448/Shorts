<!DOCTYPE html>
<html lang="yi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts Hub - Ultimate Pro Edition</title>
    <style>
        /* קאלירן דעפיניציעס */
        :root {
            --bg: #0f0f0f;
            --text: #ffffff;
            --card: #1a1a1a;
            --primary: #ff0050;
            --secondary: #0074d9;
            --border: #333333;
        }

        .light-mode {
            --bg: #ffffff;
            --text: #000000;
            --card: #f2f2f2;
            --border: #cccccc;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            font-family: sans-serif; 
            overflow: hidden; 
            transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        /* פעידזשעס סטרוקטור */
        .page { 
            display: none; 
            height: 100vh; 
            width: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            overflow-y: auto; 
            padding-bottom: 80px; 
            box-sizing: border-box; 
        }
        .active-page { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Header */
        .header { 
            position: sticky; top: 0; background: var(--bg); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px; border-bottom: 1px solid var(--border); z-index: 1000; 
        }
        .logo { font-size: 20px; font-weight: bold; color: var(--primary); }

        /* קנעפלעך */
        .btn { 
            background: var(--primary); color: white; border: none; 
            padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .btn:active { transform: scale(0.95); }

        /* Drawer פאר קאמענטארן */
        .drawer { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 60%; 
            background: var(--card); transition: 0.4s; z-index: 3000; 
            border-top-radius: 20px; padding: 20px; box-sizing: border-box;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        .drawer.open { bottom: 0; }

        /* פראפיל און אדמין */
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; background: #444; margin: 0 auto 10px; border: 2px solid var(--primary); }
        .admin-box { background: rgba(0, 116, 217, 0.1); border: 1px dashed var(--secondary); padding: 15px; border-radius: 10px; margin: 15px; }

        /* Bottom Nav */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; display: flex; 
            justify-content: space-around; background: var(--bg); 
            padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; 
        }
        .nav-item { text-align: center; color: #888; cursor: pointer; flex: 1; }
        .nav-item.active-nav { color: var(--primary); }
        .nav-icon { font-size: 20px; display: block; }
        .nav-text { font-size: 10px; margin-top: 2px; }
    </style>
</head>
<body id="mainBody" dir="rtl">

    <div id="homePage" class="page active-page">
        <div class="header">
            <div class="logo" id="siteNameDisplay">Shorts Hub</div>
            <div onclick="toggleTheme()" style="cursor:pointer; font-size: 20px;">🌓</div>
        </div>
        <div style="padding: 20px; text-align: center;">
            <h2 id="txt-welcome">ברוכים הבאים!</h2>
            <div style="background:var(--card); padding:50px; border-radius:15px; border:1px solid var(--border);" onclick="showPage('shortsPage')">
                <span style="font-size: 40px;">▶</span><br>
                <span id="txt-play">צום ווידעא</span>
            </div>
        </div>
    </div>

    <div id="requestPage" class="page">
        <div class="header"><strong id="txt-req-title">נייע איידיעס</strong></div>
        <div style="padding: 20px;">
            <p id="txt-req-desc">שרייב דא דיין געדאנק פאר א נייע פיטשער:</p>
            <textarea id="ideaInput" style="width:100%; height:100px; background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px;"></textarea>
            <button class="btn" style="width:100%; margin-top:10px;" onclick="addIdea()" id="txt-send-req">שיק ריקוועסט</button>
            <div id="ideasList" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="profilePage" class="page">
        <div class="header"><strong id="txt-prof-title">מיין אקאונט</strong></div>
        <div style="text-align:center; padding:30px;">
            <div class="profile-pic"></div>
            <h3 id="profileName">@Admin_User <span style="color:var(--secondary)">✔</span></h3>
            <button class="btn" style="background:#444;" onclick="switchLanguage()" id="txt-lang-btn">טויש שפראך / Language</button>
            <br><br>
            <button class="btn" style="background:var(--secondary);" onclick="showPage('adminPage')" id="txt-admin-btn">Admin Panel</button>
        </div>
    </div>

    <div id="adminPage" class="page">
        <div class="header"><span onclick="showPage('profilePage')" style="cursor:pointer;">←</span> <strong>Admin Panel</strong></div>
        <div class="admin-box">
            <h4>טויש סיסטעם נאמען</h4>
            <input type="text" id="siteNameInput" style="padding:8px; width:60%;" placeholder="נייע נאמען">
            <button class="btn" onclick="updateSiteName()">Update</button>
        </div>
        <div style="padding:20px;">
            <button class="btn" style="background:red;" onclick="alert('אלע דאטא איז גערוימט')">Clear Cache</button>
        </div>
    </div>

    <div id="shortsPage" class="page" style="background:black; padding:0;">
        <div style="position:absolute; top:20px; left:20px; z-index:2000; font-size:30px; color:white;" onclick="showPage('homePage')">←</div>
        <video id="mainVideo" src="video.mp4" loop muted playsinline autoplay style="width:100%; height:100%; object-fit:cover;"></video>
        <div style="position:absolute; right:15px; bottom:100px; display:flex; flex-direction:column; gap:25px; font-size:28px;">
            <div onclick="alert('Liked!')">❤️</div>
            <div onclick="toggleComments()">💬</div>
            <div onclick="alert('Shared!')">🔗</div>
        </div>
    </div>

    <div id="commentsDrawer" class="drawer">
        <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--border); padding-bottom:10px;">
            <strong>Comments</strong>
            <span onclick="toggleComments()" style="cursor:pointer;">✖</span>
        </div>
        <div style="padding:15px 0;">
            <p><strong>@User1:</strong> דאס ארבעט מורא'דיג!</p>
            <p><strong>@Admin:</strong> נייע אפדעיט קומט באלד.</p>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active-nav" onclick="showPage('homePage', this)">
            <span class="nav-icon">🏠</span><span class="nav-text" id="nav-home">היים</span>
        </div>
        <div class="nav-item" onclick="showPage('requestPage', this)">
            <span class="nav-icon">💡</span><span class="nav-text" id="nav-ideas">איידיעס</span>
        </div>
        <div class="nav-item" style="color:var(--primary); font-size:30px;">⊕</div>
        <div class="nav-item" onclick="showPage('shortsPage', this)">
            <span class="nav-icon">🎬</span><span class="nav-text" id="nav-shorts">שאָרטס</span>
        </div>
        <div class="nav-item" onclick="showPage('profilePage', this)">
            <span class="nav-icon">👤</span><span class="nav-text" id="nav-prof">פּראָפֿיל</span>
        </div>
    </div>

    <script>
        let currentLang = 'yi';

        function showPage(pageId, navEl) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            
            if(navEl) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-nav'));
                navEl.classList.add('active-nav');
            }

            let v = document.getElementById('mainVideo');
            if(pageId === 'shortsPage') { v.play(); } else { v.pause(); }
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        function toggleComments() {
            document.getElementById('commentsDrawer').classList.toggle('open');
        }

        function addIdea() {
            let input = document.getElementById('ideaInput');
            if(input.value.trim() !== "") {
                let div = document.createElement('div');
                div.style.background = "var(--card)";
                div.style.padding = "10px";
                div.style.borderRadius = "8px";
                div.style.marginBottom = "10px";
                div.innerHTML = "<b>Idea:</b> " + input.value;
                document.getElementById('ideasList').prepend(div);
                input.value = "";
                alert("Submitted!");
            }
        }

        function updateSiteName() {
            let name = document.getElementById('siteNameInput').value;
            if(name) {
                document.getElementById('siteNameDisplay').innerText = name;
                alert("Site Name Updated!");
            }
        }

        function switchLanguage() {
            if(currentLang === 'yi') {
                currentLang = 'en';
                document.getElementById('mainBody').dir = 'ltr';
                updateUI('Home', 'Ideas', 'Shorts', 'Profile', 'Welcome!', 'To Video', 'Account', 'Change Language', 'Ideas');
            } else {
                currentLang = 'yi';
                document.getElementById('mainBody').dir = 'rtl';
                updateUI('היים', 'איידיעס', 'שאָרטס', 'פּראָפֿיל', 'ברוכים הבאים!', 'צום ווידעא', 'מיין אקאונט', 'טויש שפראך', 'נייע איידיעס');
            }
        }

        function updateUI(h, i, s, p, wel, play, prof, lang, reqT) {
            document.getElementById('nav-home').innerText = h;
            document.getElementById('nav-ideas').innerText = i;
            document.getElementById('nav-shorts').innerText = s;
            document.getElementById('nav-prof').innerText = p;
            document.getElementById('txt-welcome').innerText = wel;
            document.getElementById('txt-play').innerText = play;
            document.getElementById('txt-prof-title').innerText = prof;
            document.getElementById('txt-lang-btn').innerText = lang;
            document.getElementById('txt-req-title').innerText = reqT;
        }
    </script>
</body>
    </html>
