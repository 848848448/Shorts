<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>PLATFORM<span>NEXT</span></h1>
        </header>

        <div class="content-grid">
            <section id="video-section" class="box">
                <h2><span>▶️</span> ווידעאָס</h2>
                <div id="video-list"></div>
            </section>
            
            <section id="music-section" class="box">
                <h2><span>🎵</span> מוזיק</h2>
                <div id="music-list"></div>
            </section>

            <section id="chat-section" class="box">
                <h2><span>💬</span> טשעט</h2>
                <div id="chat-display"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="שרייב...">
                    <button onclick="sendChatMessage()">Send</button>
                </div>
            </section>

            <section id="admin-panel" class="box">
                <h2><span>⚙️</span> אדמין</h2>
                <input type="text" id="content-title" placeholder="נאמען">
                <input type="file" id="content-file" accept="video/*,audio/*">
                <select id="content-type" style="display:none;"><option value="videos">videos</option></select>
                <button onclick="uploadContent()">Upload</button>
                
                <div id="progress-container" style="display: none;">
                    <div class="progress-track"><div id="progress-bar"></div></div>
                </div>
            </section>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
        </html>
