<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Entertainment Platform</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; overflow-x: hidden; }
        
        /* 🛡️ 1. First-Time Welcome Form Overlay */
        #welcomeFormOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            align-items: center; justify-content: center;
        }
        .form-card {
            background: #111; padding: 30px; border-radius: 12px;
            width: 90%; max-width: 400px; text-align: center; border: 1px solid #333;
        }
        .form-card input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px;
            border: 1px solid #444; background: #222; color: #fff; text-align: right;
        }
        .form-card button {
            width: 100%; padding: 12px; border-radius: 6px; border: none;
            background: #007fff; color: #fff; font-weight: bold; cursor: pointer;
        }

        /* 📱 Main App Layout & Navigation */
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .main-content { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .nav-tabs {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            background: #111; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #222; z-index: 999;
        }
        .tab-btn { color: #888; background: none; border: none; font-size: 14px; cursor: pointer; padding: 10px; }
        .tab-btn.active { color: #007fff; font-weight: bold; }

        /* 📸 Instagram Style Shorts Section */
        .shorts-container { display: none; height: 100%; scroll-snap-type: y mandatory; overflow-y: scroll; }
        .short-video-wrapper {
            position: relative; width: 100%; height: calc(100vh - 65px);
            scroll-snap-align: start; background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .video-overlay-data {
            position: absolute; bottom: 40px; right: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 15px; text-align: right;
        }
        .interaction-btn { background: rgba(0,0,0,0.6); border: none; color: #fff; padding: 10px; border-radius: 50%; cursor: pointer; }

        /* 🎵 YouTube Music Player Style Section */
        .music-container { display: none; padding: 20px; text-align: center; }
        .audio-player-ui {
            background: #111; padding: 20px; border-radius: 12px;
            margin-top: 20px; border: 1px solid #222;
        }
        
        /* 💬 WhatsApp Style Chat Section */
        .chat-container { display: none; flex-direction: column; height: calc(100vh - 65px); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 8px; max-width: 75%; width: fit-content; }
        .message.sent { background: #005c4b; align-self: flex-start; }
        .message.received { background: #202c33; align-self: flex-end; }
        .chat-input-area {
            background: #111; padding: 10px; display: flex; align-items: center; gap: 10px;
            border-top: 1px solid #222;
        }
        .chat-input-area input[type="text"] {
            flex: 1; padding: 10px; background: #222; border: 1px solid #333; color: #fff; border-radius: 6px;
        }

        /* 📊 Secret Admin Dashboard Overlay */
        #adminDashboard {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 5000; display: none; padding: 20px; overflow-y: auto;
        }
        .admin-card { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="welcomeFormOverlay">
        <div class="form-card">
            <h2>ברוכים הבאים!</h2>
            <p>ביטע לייגט אריין אייערע אינפארמאציע קודם:</p>
            <form id="firstTimeForm">
                <input type="text" id="userNickname" placeholder="Nickname" required>
                <input type="tel" id="userPhone" placeholder="Phone Number" required>
                <input type="email" id="userEmail" placeholder="Email Address" required>
                <button type="submit">אריינגיין אינעם סייט</button>
            </form>
        </div>
    </div>

    <div class="app-container">
        <div class="main-content">
            
            <div id="shortsTab" class="shorts-container" style="display: block;">
                <div class="short-video-wrapper">
                    <video src="" loop muted playsinline></video>
                    <div class="video-overlay-data">
                        <span id="videoAuthor">@username</span>
                        <button class="interaction-btn" onclick="likeVideo()">❤️ <span id="likeCount">0</span></button>
                        <button class="interaction-btn">👁️ <span id="viewCount">0</span></button>
                    </div>
                </div>
            </div>

            <div id="musicTab" class="music-container">
                <h2>מוזיק פלייער</h2>
                <div class="audio-player-ui">
                    <h3 id="currentTrackTitle">קלייב אויס א ניגון</h3>
                    <audio id="mainAudioPlayer" controls style="width: 100%; margin-top: 15px;"></audio>
                    <button class="interaction-btn" style="margin-top: 10px;" onclick="toggleFavorite()">⭐ צולייגן צו ליבסטע</button>
                </div>
                <div id="musicList" style="margin-top: 20px; text-align: right;"></div>
            </div>

            <div id="chatTab" class="chat-container">
                <div id="chatStatus" style="font-size: 12px; color: #888; padding: 5px 15px; text-align: right;"></div>
                <div class="chat-messages" id="chatMessagesBox"></div>
                <div class="chat-input-area">
                    <button class="interaction-btn" onclick="triggerChatFileSelect()">📎</button>
                    <input type="file" id="chatFileInput" style="display: none;" onchange="uploadChatFile(this)">
                    
                    <input type="text" id="chatMessageInput" placeholder="שרייב א מעסעדזש..." oninput="broadcastTypingStatus()">
                    <button class="interaction-btn" onclick="sendTextMessage()">➡️</button>
                </div>
            </div>

        </div>

        <div id="adminDashboard">
            <button onclick="closeAdminPanel()" style="background: red; color: white; padding: 10px; border: none; border-radius: 50%; float: left; cursor: pointer;">X</button>
            <h2 style="margin-bottom: 20px;">Admin Dashboard קאנטראל פאנעל</h2>
            
            <div class="admin-card">
                <h3>ארויפלאדן א נייע ווידעא (Shorts) פונעם File Manager</h3>
                <input type="file" id="adminVideoUpload" accept="video/*" style="margin-top: 10px;">
                <input type="text" id="adminVideoTitle" placeholder="ווידעא נאמען" style="width:100%; padding:8px; margin-top:10px; background:#111; color:#fff; border:1px solid #444;">
                <button onclick="uploadVideoFromAdmin()" style="margin-top:10px; padding:8px 15px; background:green; color:white; border:none; border-radius:4px; cursor:pointer;">Upload Video</button>
            </div>

            <div class="admin-card">
                <h3>רשימת המעמבערס (געכאפט דורך די פארעם)</h3>
                <div id="adminUsersList" style="margin-top: 10px; text-align: right; font-size: 14px;"></div>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn" onclick="switchTab('admin')">⚙️ Admin</button>
            <button class="tab-btn" onclick="switchTab('chat')">💬 Chats</button>
            <button class="tab-btn" onclick="switchTab('music')">🎵 Music</button>
            <button class="tab-btn active" onclick="switchTab('shorts')">📸 Shorts</button>
        </div>
    </div>

    <script>
        // 1. Firebase קאָנפֿיגוראַציע (לייג אריין דיינע ריכטיגע דעטאלן דא)
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    databaseURL: "YOUR_DATABASE_URL",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
};
// איניציאליזירן Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

// 2. די Pipedream וועבהוק לינק פאר דיינע SMS מעלדונגען
const pipedreamUrl = "https://eo2ws38ucniphqy.m.pipedream.net";

// 3. קאָנטראָל פֿאַר די ערשטע-מאָל לאָגין פארעם
window.addEventListener('DOMContentLoaded', () => {
    const isRegistered = localStorage.getItem('site_member_registered');
    if (!isRegistered) {
        document.getElementById('welcomeFormOverlay').style.display = 'flex';
    }
    
    // סובמיט לאגיק פונעם פארעם
    document.getElementById('firstTimeForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nickname = document.getElementById('userNickname').value;
        const phone = document.getElementById('userPhone').value;
        const email = document.getElementById('userEmail').value;
        
        const userData = { nickname, phone, email, timestamp: Date.now() };
        
        // א) שיקן די דאטא גראד צו דיין Pipedream פאר א בליץ SMS
        fetch(pipedreamUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        }).then(() => console.log('SMS trigger sent!'))
          .catch(err => console.error('Error sending SMS:', err));
          
        // ב) היטן אינעם Firebase דאטאבעיס פאר'ן Admin Dashboard
        db.ref('site_members').push(userData);
        
        // ג) סייוון אויפ'ן טעלעפון פונעם באניצער אז ער איז שוין רעגיסטרירט
        localStorage.setItem('site_member_registered', 'true');
        localStorage.setItem('current_user_nickname', nickname);
        
        // ד) פארמאכן דעם פענצטער און אריינגיין אינעם סייט
        document.getElementById('welcomeFormOverlay').style.display = 'none';
        alert("ברוכים הבאים! אייער אינפארמאציע איז געווארן באשטעטיגט.");
    });
    
    loadShorts();
    loadMessages();
});

// 4. טוישן די סקרינס (Tabs) ווי אינסטאגראם/וואטסעפּ
function switchTab(tabName) {
    document.getElementById('shortsTab').style.display = tabName === 'shorts' ? 'block' : 'none';
    document.getElementById('musicTab').style.display = tabName === 'music' ? 'block' : 'none';
    document.getElementById('chatTab').style.display = tabName === 'chat' ? 'flex' : 'none';
    document.getElementById('adminDashboard').style.display = tabName === 'admin' ? 'block' : 'none';
    
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.currentTarget.classList.add('active');
    
    // אויב מען גייט אוועק פון די Shorts, מאך סטאפ פאר די ווידעא
    const video = document.querySelector('#shortsTab video');
    if (tabName !== 'shorts' && video) video.pause();
}

// 5. 💬 WhatsApp Style Chat מיט פֿייל מענעדזשער לאָגיק
function triggerChatFileSelect() {
    document.getElementById('chatFileInput').click(); // עפנט דעם פייל מענעדזשער
}

function uploadChatFile(input) {
    const file = input.files[0];
    if (!file) return;
    
    const user = localStorage.getItem('current_user_nickname') || 'Guest';
    const storageRef = storage.ref('chat_media/' + Date.now() + '_' + file.name);
    
    document.getElementById('chatStatus').innerText = "שיקט פייל...";
    
    storageRef.put(file).then(snapshot => snapshot.ref.getDownloadURL())
    .then(downloadURL => {
        db.ref('chat_messages').push({
            sender: user,
            mediaUrl: downloadURL,
            fileType: file.type,
            timestamp: Date.now()
        });
        document.getElementById('chatStatus').innerText = "";
    });
}

function sendTextMessage() {
    const msgInput = document.getElementById('chatMessageInput');
    const text = msgInput.value.trim();
    if (!text) return;
    
    const user = localStorage.getItem('current_user_nickname') || 'Guest';
    db.ref('chat_messages').push({
        sender: user,
        message: text,
        timestamp: Date.now()
    });
    msgInput.value = '';
}

function loadMessages() {
    db.ref('chat_messages').on('value', snapshot => {
        const box = document.getElementById('chatMessagesBox');
        box.innerHTML = '';
        const user = localStorage.getItem('current_user_nickname') || 'Guest';
        
        snapshot.forEach(child => {
            const data = child.val();
            const isMe = data.sender === user;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMe ? 'sent' : 'received'}`;
            
            if (data.message) {
                msgDiv.innerHTML = `<strong>${data.sender}:</strong><br>${data.message}`;
            } else if (data.mediaUrl) {
                if (data.fileType.startsWith('image/')) {
                    msgDiv.innerHTML = `<strong>${data.sender}:</strong><br><img src="${data.mediaUrl}" style="max-width:100%; border-radius:6px; margin-top:5px;">`;
                } else if (data.fileType.startsWith('video/')) {
                    msgDiv.innerHTML = `<strong>${data.sender}:</strong><br><video src="${data.mediaUrl}" controls style="max-width:100%; border-radius:6px; margin-top:5px;"></video>`;
                } else {
                    msgDiv.innerHTML = `<strong>${data.sender}:</strong><br><a href="${data.mediaUrl}" target="_blank" style="color:#007fff;">📁 געשיקט א פייל</a>`;
                }
            }
            box.appendChild(msgDiv);
        });
        box.scrollTop = box.scrollHeight;
    });
}

function broadcastTypingStatus() {
    const user = localStorage.getItem('current_user_nickname') || 'Guest';
    db.ref('typing_status').set({ user: user, isTyping: true });
    setTimeout(() => db.ref('typing_status').set(null), 2000);
}

db.ref('typing_status').on('value', snapshot => {
    const data = snapshot.val();
    const currentStatus = document.getElementById('chatStatus');
    if (data && data.user !== localStorage.getItem('current_user_nickname')) {
        currentStatus.innerText = `${data.user} טייפּט יעצט...`;
    } else {
        currentStatus.innerText = '';
    }
});

// 6. 📸 Instagram Style Shorts לאָגיק (Likes & Views)
function loadShorts() {
    db.ref('shorts_videos').on('value', snapshot => {
        const container = document.getElementById('shortsTab');
        container.innerHTML = ''; // קלירן אלטעס
        
        snapshot.forEach(child => {
            const id = child.key;
            const videoData = child.val();
            
            const wrapper = document.createElement('div');
            wrapper.className = 'short-video-wrapper';
            wrapper.innerHTML = `
                <video src="${videoData.url}" loop muted playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                <div class="video-overlay-data">
                    <span>${videoData.title || '@user'}</span>
                    <button class="interaction-btn" onclick="likeVideo('${id}', ${videoData.likes || 0})">❤️ <span>${videoData.likes || 0}</span></button>
                    <button class="interaction-btn">👁️ <span>${videoData.views || 0}</span></button>
                </div>
            `;
            container.appendChild(wrapper);
            
            // ווען א ווידעא קומט ארויף אויפ'ן סקרין, רעכענט עס א View
            db.ref(`shorts_videos/${id}/views`).set((videoData.views || 0) + 1);
        });
    });
}

function likeVideo(id, currentLikes) {
    db.ref(`shorts_videos/${id}/likes`).set(currentLikes + 1);
}

// 7. 📊 געהיימע Admin Dashboard לאָגיק פֿאַר דיר
function uploadVideoFromAdmin() {
    const fileInput = document.getElementById('adminVideoUpload');
    const titleInput = document.getElementById('adminVideoTitle');
    const file = fileInput.files[0];
    
    if (!file) return alert("ביטע קלייב אויס א ווידעא פייל פונעם פייל מענעדזשער!");
    
    const storageRef = storage.ref('shorts/' + Date.now() + '_' + file.name);
    alert("די ווידעא לאדט זיך ארויף, ביטע ווארט א רגע...");
    
    storageRef.put(file).then(snapshot => snapshot.ref.getDownloadURL())
    .then(downloadURL => {
        db.ref('shorts_videos').push({
            url: downloadURL,
            title: titleInput.value || 'New Short',
            likes: 0,
            views: 0
        });
        alert("די ווידעא איז פולשטענדיק ארויף געהעריג!");
        fileInput.value = '';
        titleInput.value = '';
    });
}

// לאָדן די רשימה פֿון אַלע געכאַפּטע מעמבערס פֿאַר דעם אדמין צו זען
db.ref('site_members').on('value', snapshot => {
    const listDiv = document.getElementById('adminUsersList');
    listDiv.innerHTML = '';
    snapshot.forEach(child => {
        const u = child.val();
        listDiv.innerHTML += `<p style="border-bottom:1px solid #333; padding:5px;">👤 <b>${u.nickname}</b> | 📞 ${u.phone} | ✉️ ${u.email}</p>`;
    });
});

function closeAdminPanel() {
    switchTab('shorts');
        }
    </script>
</body>
    </html>
