<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YID PLUS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #0f0f0f;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #272727;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .logo span {
            color: #ff0000;
        }
        .form-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: #212121;
            border: 1px solid #3d3d3d;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #ff0000;
        }
        .btn-submit {
            background: #ff0000;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background: #cc0000;
        }
        .switch-mode {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
        }
        .switch-mode span {
            color: #ff0000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="logo">YI<span>D</span> PLUS</div>
        </div>

        <div class="form-container">
            <h2 id="form-title" class="text-2xl font-bold mb-6 text-center">Create Account</h2>
            
            <form id="auth-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Minimum 6 characters">
                </div>
                
                <button type="submit" id="btn-text" class="btn-submit w-100">Register Now</button>
            </form>
            
            <div class="switch-mode" id="toggle-mode">
                Already have an account? <span id="toggle-text">Sign In</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Your exact valid config from the text you provided
        const firebaseConfig = {
            apiKey: "AIzaSyDjGmskzkMi3FNu02RomBPUyp45zhPEhEY",
            authDomain: "shorts-e05cc.firebaseapp.com",
            databaseURL: "https://shorts-e05cc-default-rtdb.firebaseio.com",
            projectId: "shorts-e05cc",
            storageBucket: "shorts-e05cc.firebasestorage.app",
            messagingSenderId: "677889813755",
            appId: "1:677889813755:web:e28c37e6dba645d0fc545e"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // App State
        let isSignUpMode = true;

        // DOM Elements
        const authForm = document.getElementById('auth-form');
        const formTitle = document.getElementById('form-title');
        const btnText = document.getElementById('btn-text');
        const toggleMode = document.getElementById('toggle-mode');
        const toggleText = document.getElementById('toggle-text');

        // Toggle between Login and Signup
        toggleMode.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            if (isSignUpMode) {
                formTitle.innerText = "Create Account";
                btnText.innerText = "Register Now";
                toggleMode.innerHTML = 'Already have an account? <span>Sign In</span>';
            } else {
                formTitle.innerText = "Welcome Back";
                btnText.innerText = "Sign In";
                toggleMode.innerHTML = 'New to YID PLUS? <span>Create Account</span>';
            }
        });

        // Handle Form Submit
        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (isSignUpMode) {
                // Register
                createUserWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        alert("Success! Account created for " + userCredential.user.email);
                    })
                    .catch((error) => {
                        alert("Registration Error: " + error.message);
                    });
            } else {
                // Login
                signInWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        alert("Success! Logged in as " + userCredential.user.email);
                    })
                    .catch((error) => {
                        alert("Login Error: " + error.message);
                    });
            }
        });
    </script>
</body>
    </html>
