<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE EMPIRE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="upload-progress-container" class="hidden">
        <div id="upload-progress-bar"></div>
    </div>

    <div class="online-users-bar" id="online-users-list"></div>

    <div id="app-container">
        <main id="home-page" class="page">
            <header style="padding:15px; border-bottom:1px solid #222;">
                <h1 style="color:var(--accent); margin:0;">THE EMPIRE</h1>
            </header>
            <div class="categories-grid">
                <div class="cat-card" onclick="showPage('chat-page')"><i class="fas fa-comments"></i><h3>קאמיוניטי טשעט</h3></div>
                <div class="cat-card" onclick="showPage('shorts-page')"><i class="fas fa-play-circle"></i><h3>שאָרץ</h3></div>
                <div class="cat-card" onclick="showPage('music-page')"><i class="fas fa-music"></i><h3>מוזיק</h3></div>
                <div class="cat-card" onclick="showPage('settings-page')"><i class="fas fa-cog"></i><h3>סעטינגס</h3></div>
            </div>
        </main>

        <section id="private-chat-page" class="page hidden">
            <header style="padding:15px; display:flex; align-items:center; gap:15px;">
                <i class="fas fa-arrow-right" onclick="showPage('home-page')"></i>
                <h2 id="private-chat-title" style="margin:0; font-size:1.1rem;"></h2>
            </header>
            <div id="private-messages-cont"></div>
            <div style="position:fixed; bottom:0; width:100%; padding:15px; background:#111; display:flex; gap:10px;">
                <input type="text" id="private-input" style="flex:1; padding:12px; border-radius:25px; border:none; background:#222; color:white;">
                <button onclick="sendPrivateMsg()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:50%;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>

        </div>

    <input type="file" id="file-upload-input" class="hidden">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
    </html>
